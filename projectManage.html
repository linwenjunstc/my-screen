<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM Board</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
	<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/pm.css">
<link rel="stylesheet" href="css/finance-extra.css">
<link rel="stylesheet" href="css/ai-panel.css">
</head>
<body>

<div id="page-loader">
  <div class="loader-brand">
    <div class="loader-dots">
      <span class="loader-dot"></span>
      <span class="loader-dot"></span>
      <span class="loader-dot"></span>
    </div>
    <div class="loader-progress-track">
      <div class="loader-progress-bar"></div>
    </div>
    <div class="loader-text">LOADING</div>
  </div>
</div>

<div class="layout" id="main-layout" style="display:none">
  <!-- ══════════ PM 侧栏 ══════════ -->
  <aside class="sidebar" id="sidebar-pm">
    <div class="sidebar-logo">
      <div class="sidebar-logo-row">
        <div class="logo-text"><div class="logo-icon">PM</div>PM Board</div>
        <button class="sidebar-collapse-btn" onclick="toggleSidebarCollapse()" title="折叠侧栏">
          <i data-lucide="panel-left" style="width:16px;height:16px"></i>
        </button>
      </div>
      <div class="logo-sub" id="sidebar-date-label">加载中...</div>
    </div>
    <div class="sidebar-date">导航</div>
    <nav class="sidebar-nav">
      <button class="nav-item active" data-view="today" data-menu-key="today" onclick="switchView('today')">
        <i data-lucide="calendar-days" class="nav-icon"></i> 今日看板
        <span class="nav-badge" id="badge-today">0</span>
      </button>
      <button class="nav-item" data-view="tasks" data-menu-key="tasks" onclick="switchView('tasks')">
        <i data-lucide="list-checks" class="nav-icon"></i> 全部任务
        <span class="nav-badge" id="badge-tasks">0</span>
      </button>
      <div class="nav-section-label" data-menu-key="charts" style="padding-bottom:4px">分析</div>
      <button class="nav-item" data-view="charts" data-menu-key="charts" onclick="switchView('charts')">
        <i data-lucide="bar-chart-3" class="nav-icon"></i> 数据统计
      </button>
      <button class="nav-item" data-view="gantt" data-menu-key="gantt" onclick="switchView('gantt')">
        <i data-lucide="chart-no-axes-gantt" class="nav-icon"></i> 甘特图
      </button>
      <div data-menu-key="projects" style="display:flex;align-items:center;justify-content:space-between;padding-right:8px">
        <div class="nav-section-label" style="padding-right:0">项目</div>
        <button id="sidebar-add-proj-btn" onclick="openAddProject()" title="新建项目"
          style="width:20px;height:20px;border-radius:4px;border:1px solid rgba(255,255,255,.12);background:transparent;cursor:pointer;color:var(--sb-text2);font-size:15px;display:flex;align-items:center;justify-content:center;line-height:1;flex-shrink:0;transition:all .15s"
          onmouseover="this.style.background='var(--sb-hover)';this.style.color='var(--sb-text)'"
          onmouseout="this.style.background='transparent';this.style.color='var(--sb-text2)'">+</button>
      </div>
      <div id="sidebar-projects" data-menu-key="projects"></div>
    </nav>
    <div class="sidebar-bottom">
      <button class="sidebar-add-btn" data-menu-key="add_task" onclick="openAddTask()">
        <i data-lucide="plus" style="width:16px;height:16px"></i> 快速添加任务
      </button>
    </div>
  </aside>

  <!-- ══════════ 资金计划侧栏 ══════════ -->
  <aside class="sidebar fin-sidebar" id="sidebar-finance" style="display:none">
    <div class="sb-logo">
      <div class="sb-logo-text"><div class="sb-logo-icon">PM</div>PM Board</div>
      <div class="sb-sub" id="sb-dept-name">资金计划模块</div>
    </div>
    <div class="month-picker">
      <div class="month-label">月份</div>
      <select class="month-select" id="month-select" onchange="onMonthChange(this.value)"></select>
    </div>
    <div class="sb-section">计划报表</div>
    <nav class="sb-nav">
      <button class="sb-item active" id="tab-t1" data-menu-key="fin_t1" onclick="switchTab('t1')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="14" height="14" rx="2"/><line x1="1" y1="5.5" x2="15" y2="5.5"/><line x1="1" y1="9.5" x2="15" y2="9.5"/></svg>月度资金计划
      </button>
      <button class="sb-item" id="tab-receipt" data-menu-key="fin_receipt" onclick="switchTab('receipt')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="1,12 5,7 8,10 11,6 15,3"/></svg>对上收款台账
      </button>
      <button class="sb-item" id="tab-payment" data-menu-key="fin_payment" onclick="switchTab('payment')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="14" height="10" rx="2"/><line x1="1" y1="7" x2="15" y2="7"/></svg>对下付款计划
      </button>
      <button class="sb-item" id="tab-t4" data-menu-key="fin_t4" onclick="switchTab('t4')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="2,12 5,8 8,10 11,5 14,3"/><line x1="2" y1="13" x2="14" y2="13"/></svg>完成情况
      </button>
      <button class="sb-item" id="tab-t5" data-menu-key="fin_t5" onclick="switchTab('t5')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><polyline points="8,5 8,8 10,10"/></svg>实际收款明细
      </button>
      <button class="sb-item" id="tab-t6" data-menu-key="fin_t6" onclick="switchTab('t6')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><polyline points="8,5 8,8 6,10"/></svg>实际支付明细
      </button>
      <button class="sb-item" id="tab-dashboard" data-menu-key="fin_dashboard" onclick="switchTab('dashboard')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="9" width="4" height="6" rx="1"/><rect x="6" y="5" width="4" height="10" rx="1"/><rect x="11" y="1" width="4" height="14" rx="1"/></svg>资金看板
      </button>
      <div class="sb-section">基础库</div>
      <button class="sb-item" id="tab-contracts" data-menu-key="base_contracts" onclick="switchTab('contracts')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 2h10v12H3z"/><line x1="5" y1="5.5" x2="11" y2="5.5"/><line x1="5" y1="8" x2="11" y2="8"/><line x1="5" y1="10.5" x2="9" y2="10.5"/></svg>合同库
      </button>
      <button class="sb-item" id="tab-customers" data-menu-key="base_customers" onclick="switchTab('customers')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="5" r="3"/><path d="M2 14c0-3.314 2.686-5 6-5s6 1.686 6 5"/></svg>客户库
      </button>
      <button class="sb-item" id="tab-suppliers" data-menu-key="base_suppliers" onclick="switchTab('suppliers')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="6" width="14" height="8" rx="1"/><path d="M4 6V4a4 4 0 0 1 8 0v2"/></svg>供应商库
      </button>
    </nav>
    <div class="sb-bottom">
      <button class="sb-util" id="basic-info-btn" data-menu-key="basic_info" onclick="openBasicInfoModal()">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><line x1="8" y1="5" x2="8" y2="8"/><circle cx="8" cy="11" r=".5" fill="currentColor"/></svg>基础信息配置
      </button>
    </div>
  </aside>

  <!-- ══════════ 主内容区 ══════════ -->
  <main class="main">
    <!-- Top tab bar -->
    <div class="top-tab-bar" id="top-tab-bar">
      <div class="top-tab-group">
        <button class="top-tab active" id="top-tab-pm" onclick="switchModule('pm')"><i data-lucide="list-todo" style="width:15px;height:15px"></i>项目管理</button>
        <button class="top-tab" id="top-tab-finance" onclick="switchModule('finance')"><i data-lucide="landmark" style="width:15px;height:15px"></i>资金计划</button>
      </div>
      <div class="top-tab-right">
        <!-- ── AI 助手入口 ── -->
        <button class="ai-trigger-btn" id="ai-trigger-btn"
          data-menu-key="ai_assistant"
          onclick="toggleAiPanel()" title="AI 任务助手">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a7 7 0 0 1 7 7c0 2.5-1.3 4.7-3.3 6L14 21H10l-1.7-6C6.3 13.7 5 11.5 5 9a7 7 0 0 1 7-7z"/>
            <line x1="9" y1="21" x2="15" y2="21"/>
            <line x1="9.5" y1="17" x2="14.5" y2="17"/>
          </svg>
        </button>
        <!-- ── AI 助手入口 end ── -->
        <button class="theme-toggle-btn" onclick="toggleTheme()" title="切换主题">
          <i data-lucide="sun" class="theme-icon-light" style="width:15px;height:15px"></i>
          <i data-lucide="moon" class="theme-icon-dark" style="width:15px;height:15px"></i>
        </button>
        <!-- ── 通知铃铛 ── -->
        <div class="notif-wrap" id="notif-wrap">
          <button class="notif-trigger" id="notif-trigger"
            onclick="toggleNotifPanel(event)" title="通知提醒">
            <svg class="notif-bell-icon" id="notif-bell-icon"
              width="18" height="18" viewBox="0 0 18 18"
              fill="none" stroke="currentColor"
              stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <!-- 铃铛弧形顶部 -->
              <path d="M9 2C9 2 9 2.5 9 3"/>
              <!-- 铃铛身体 -->
              <path d="M14 10c0-2.76-2.24-5-5-5S4 7.24 4 10c0 2.5-.6 3.8-1.5 4.5h13C14.6 13.8 14 12.5 14 10z"/>
              <!-- 铃舌 -->
              <path d="M7 14.5a2 2 0 0 0 4 0"/>
            </svg>
            <!-- 未读角标 -->
            <span class="notif-badge" id="notif-badge"></span>
          </button>

          <!-- 通知面板 -->
          <div class="notif-panel" id="notif-panel" style="display:none">
            <div class="notif-panel-header">
              <div class="notif-panel-title">
                <svg width="14" height="14" viewBox="0 0 18 18" fill="none"
                  stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                  <path d="M14 10c0-2.76-2.24-5-5-5S4 7.24 4 10c0 2.5-.6 3.8-1.5 4.5h13C14.6 13.8 14 12.5 14 10z"/>
                  <path d="M7 14.5a2 2 0 0 0 4 0"/>
                </svg>
                <span>提醒</span>
                <span class="notif-unread-count" id="notif-unread-count"></span>
              </div>
              <button class="notif-read-all" onclick="markAllNotifsRead()">全部已读</button>
            </div>
            <div class="notif-body" id="notif-list">
              <div class="notif-empty-state">暂无提醒</div>
            </div>
          </div>
        </div>
        <!-- ── 通知铃铛 end ── -->
        <div class="user-dropdown" id="user-dropdown">
          <button class="user-dropdown-trigger" onclick="toggleUserDropdown(event)">
            <div class="member-avatar" id="user-avatar-top" style="width:26px;height:26px;font-size:11px;background:var(--accent);color:#fff">?</div>
            <span class="user-dropdown-name" id="user-name-top">加载中...</span>
            <i data-lucide="chevron-down" class="user-dropdown-chevron" style="width:14px;height:14px"></i>
          </button>
          <div class="user-dropdown-menu" id="user-dropdown-menu">
            <div class="dropdown-user-info">
              <span id="dropdown-user-name" style="font-size:13px;font-weight:600;color:var(--text)">—</span>
              <span id="dropdown-user-role" class="role-badge role-user" style="margin-top:2px">普通用户</span>
            </div>
            <div class="dropdown-divider"></div>
            <button class="dropdown-item" onclick="openChangePasswordModal();closeUserDropdown()">
              <i data-lucide="key" style="width:14px;height:14px"></i> 修改密码
            </button>
            <button class="dropdown-item" id="dropdown-system-config" data-menu-key="system_config" onclick="openSystemConfigModal();closeUserDropdown()">
              <i data-lucide="settings" style="width:14px;height:14px"></i> 系统配置
            </button>
            <div class="dropdown-divider"></div>
            <button class="dropdown-item dropdown-item-danger" onclick="handleLogout()">
              <i data-lucide="log-out" style="width:14px;height:14px"></i> 退出登录
            </button>
          </div>
        </div>
      </div>
    </div>

    <header class="main-header">
      <button class="mobile-menu-btn" onclick="toggleMobileSidebar()" title="菜单"><i data-lucide="menu"></i></button>
      <div>
        <div class="main-title" id="header-title">今日看板</div>
        <div class="main-subtitle" id="header-sub"></div>
      </div>
      <div class="header-actions">
        <div class="header-search" id="task-search-wrap" style="display:none">
          <i data-lucide="search" class="search-icon" style="width:14px;height:14px"></i>
          <input type="text" placeholder="搜索任务..." id="task-search-input" oninput="onSearch(this.value)">
        </div>
        <button class="btn btn-ghost btn-sm" id="header-export-btn" onclick="exportCSV()" style="display:none"><i data-lucide="download" style="width:13px;height:13px;margin-right:3px"></i>导出 CSV</button>
        <button class="btn btn-primary btn-sm" id="header-add-btn" onclick="openAddTask()" style="display:none"><i data-lucide="plus" style="width:13px;height:13px;margin-right:3px"></i>新建任务</button>
        <button class="btn btn-primary btn-sm" id="header-add-proj-btn" onclick="openAddProject()" style="display:none"><i data-lucide="plus" style="width:13px;height:13px;margin-right:3px"></i>新建项目</button>
        <button class="btn btn-ghost btn-sm" id="header-gantt-today-btn" onclick="ganttScrollToday()" style="display:none">今天</button>
        <!-- Finance header buttons -->
        <button class="btn btn-green btn-sm" id="export-btn" onclick="exportXlsx()" style="display:none"><i data-lucide="download" style="width:13px;height:13px;margin-right:3px"></i>导出 Excel</button>
        <button class="btn btn-primary btn-sm" id="add-btn" onclick="openAddModal()" style="display:none"><i data-lucide="plus" style="width:13px;height:13px;margin-right:3px"></i>新增</button>
      </div>
    </header>
    <div class="main-content" id="main-content"></div>
  </main>
</div>

<div class="sidebar-backdrop" id="sidebar-backdrop" onclick="closeMobileSidebar()"></div>
<div class="modal-overlay" id="modal-overlay" onclick="onOverlayClick(event)">
  <div class="modal" id="modal-box" onclick="event.stopPropagation()"></div>
</div>
<div class="toast" id="toast"></div>
<div class="chart-tooltip" id="chart-tooltip"></div>
<div class="confetti-container" id="confetti-container"></div>
<!-- ══════════ AI 助手面板 ══════════ -->
<div id="ai-panel-overlay" onclick="closeAiPanel()"></div>

<div id="ai-panel">
  <div class="ai-panel-header">
    <div class="ai-panel-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a7 7 0 0 1 7 7c0 2.5-1.3 4.7-3.3 6L14 21H10l-1.7-6C6.3 13.7 5 11.5 5 9a7 7 0 0 1 7-7z"/>
        <line x1="9" y1="21" x2="15" y2="21"/>
        <line x1="9.5" y1="17" x2="14.5" y2="17"/>
      </svg>
    </div>
    <span class="ai-panel-title">AI 任务助手</span>
    <span class="ai-key-status" id="ai-key-status"></span>
    <span class="ai-perm-badge" id="ai-perm-badge">PM · 资金</span>
    <button class="ai-header-btn" id="ai-key-gear-btn" style="display:none" onclick="_toggleApiKeySettings()" title="API Key 设置">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
    </button>
    <button class="ai-header-btn" onclick="clearAiChat()" title="清空对话">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
        stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>
        <path d="M10 11v6"/><path d="M14 11v6"/>
      </svg>
    </button>
    <button class="ai-header-btn" onclick="closeAiPanel()" title="关闭">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
        stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- API Key 设置面板（仅 super_admin 可见） -->
  <div class="ai-apikey-panel" id="ai-apikey-panel" style="display:none">
    <div class="ai-apikey-label">DeepSeek API Key</div>
    <div class="ai-apikey-row">
      <input type="password" id="ai-apikey-input" class="ai-apikey-input"
        placeholder="sk-..." autocomplete="off">
      <button class="ai-apikey-save" onclick="saveAiApiKey(this)">保存</button>
    </div>
    <div class="ai-apikey-hint">Key 将使用 AES-GCM 加密后存入数据库，仅超级管理员可配置</div>
  </div>

  <div class="ai-quick-area">
    <div class="ai-quick-label">快捷查询</div>
    <div class="ai-quick-chips">
      <button class="ai-quick-chip" onclick="askAiQuick('现在有哪些逾期任务？')">逾期任务</button>
      <button class="ai-quick-chip" onclick="askAiQuick('本周有哪些紧急任务，分别是谁负责的？')">本周紧急</button>
      <button class="ai-quick-chip" onclick="askAiQuick('今天有哪些任务到期？')">今日到期</button>
      <button class="ai-quick-chip" onclick="askAiQuick('各个项目目前的进展如何，有没有延期风险？')">项目风险</button>
    </div>
  </div>

  <div id="ai-messages"></div>

  <div class="ai-input-area">
    <div class="ai-input-wrap">
      <textarea
        id="ai-input"
        rows="1"
        placeholder="问我任何关于任务的问题..."
        onkeydown="aiInputKeydown(event)"
        oninput="onAiInputChange(this)"></textarea>
      <button class="ai-send-btn" id="ai-send-btn" onclick="sendAiMsg()" title="发送 (Enter)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
      <button class="ai-stop-btn" id="ai-stop-btn" onclick="stopAiMsg()" title="停止生成" style="display:none">
        <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14">
          <rect x="6" y="6" width="12" height="12" rx="2"/>
        </svg>
      </button>
    </div>
    <div class="ai-input-hint">Enter 发送 · Shift+Enter 换行</div>
  </div>
</div>
<!-- ══════════ AI 助手面板 end ══════════ -->

<!-- Keyboard shortcuts help -->
<div class="shortcuts-overlay" id="shortcuts-overlay" onclick="closeShortcutsHelp()">
  <div class="shortcuts-panel" onclick="event.stopPropagation()">
    <div class="shortcuts-header">
      <span class="shortcuts-title">键盘快捷键</span>
      <button class="modal-close" onclick="closeShortcutsHelp()"><i data-lucide="x"></i></button>
    </div>
    <div class="shortcuts-grid">
      <div class="shortcut-item"><kbd>N</kbd><span>新建任务</span></div>
      <div class="shortcut-item"><kbd>/</kbd><span>聚焦搜索</span></div>
      <div class="shortcut-item"><kbd>1</kbd><span>今日看板</span></div>
      <div class="shortcut-item"><kbd>2</kbd><span>全部任务</span></div>
      <div class="shortcut-item"><kbd>3</kbd><span>项目</span></div>
      <div class="shortcut-item"><kbd>4</kbd><span>数据统计</span></div>
      <div class="shortcut-item"><kbd>5</kbd><span>甘特图</span></div>
      <div class="shortcut-item"><kbd>Esc</kbd><span>关闭弹窗</span></div>
      <div class="shortcut-item"><kbd>?</kbd><span>显示快捷键</span></div>
      <div class="shortcut-item"><kbd>Ctrl+K</kbd><span>切换主题</span></div>
    </div>
  </div>
</div>

<!-- JS 模块 -->
<script src="js/pm-core.js"></script>
<script src="js/pm-views.js"></script>
<script src="js/pm-tasks.js"></script>
<script src="js/pm-projects.js"></script>
<script src="js/pm-members.js"></script>
<script src="js/pm-logs.js"></script>
<script src="js/pm-auth.js"></script>

<script src="js/finance-t2.js"></script>

<script>
// Module switching
let activeModule = 'pm';
let financeInitialized = false;

window.switchModule = function(mod) {
  if (mod === activeModule) return;
  // 权限守卫：没有对应分组菜单权限则不允许切换
  if (mod === 'pm' && typeof hasGroupPerm === 'function' && !hasGroupPerm('pm')) return;
  if (mod === 'finance' && typeof hasGroupPerm === 'function' && !hasGroupPerm('finance') && !hasGroupPerm('base')) return;
  activeModule = mod;
  closeMobileSidebar();

  const pmSidebar = document.getElementById('sidebar-pm');
  const finSidebar = document.getElementById('sidebar-finance');
  const topTabPM = document.getElementById('top-tab-pm');
  const topTabFin = document.getElementById('top-tab-finance');

  if (mod === 'pm') {
    pmSidebar.style.display = 'flex';
    finSidebar.style.display = 'none';
    topTabPM.classList.add('active');
    topTabFin.classList.remove('active');
    // Show PM header buttons, hide finance buttons
    updateHeaderForModule('pm');
    // Render PM view
    switchView('today');
  } else {
    pmSidebar.style.display = 'none';
    finSidebar.style.display = 'flex';
    topTabPM.classList.remove('active');
    topTabFin.classList.add('active');
    updateHeaderForModule('finance');
    // Lazy init finance
    if (!financeInitialized) {
      financeInitialized = true;
      initFinance().then(() => {
        switchTab('t1');
      });
    } else {
      switchTab(currentTab || 't1');
    }
  }
};

function updateHeaderForModule(mod) {
  const finElements = ['export-btn', 'add-btn'];
  finElements.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = mod === 'finance' ? '' : 'none';
  });

  // 资金计划页面不需要 PM 的新建任务/项目等按钮
  const pmOnlyElements = ['header-add-btn', 'header-add-proj-btn', 'header-gantt-today-btn', 'task-search-wrap'];
  pmOnlyElements.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = 'none';
  });

  // Reset header title
  if (mod === 'finance') {
    document.getElementById('header-title').textContent = '月度资金计划';
  }
}

// System config modal — opens consolidated settings
window.openSystemConfigModal = function() {
  openModal(modalHeader('系统配置') + `<div class="modal-body">
    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
      <button class="btn btn-ghost btn-sm" onclick="closeModal();openMembersModal()"><i data-lucide="users" style="width:14px;height:14px;margin-right:4px"></i>成员管理</button>
      <button class="btn btn-ghost btn-sm" onclick="closeModal();openTagsModal()"><i data-lucide="tags" style="width:14px;height:14px;margin-right:4px"></i>标签管理</button>
      <button class="btn btn-ghost btn-sm" onclick="closeModal();openRoleManageModal()"><i data-lucide="shield-check" style="width:14px;height:14px;margin-right:4px"></i>角色权限</button>
      <button class="btn btn-ghost btn-sm" onclick="closeModal();openLogsModal()"><i data-lucide="scroll-text" style="width:14px;height:14px;margin-right:4px"></i>操作日志</button>
    </div>
    <p style="font-size:12px;color:var(--text3);text-align:center;padding:20px 0">公司/事业部名称请在「基础信息配置 → 基础信息配置」中设置</p>
  </div>
  <div class="modal-footer">
    <div></div>
    <button class="btn btn-ghost" onclick="closeModal()">关闭</button>
  </div>`);
};

// Mobile sidebar toggle
window.toggleMobileSidebar = function() {
  const sidebar = document.querySelector('.sidebar:not([style*=\"display: none\"])') ||
                  document.getElementById('sidebar-pm');
  const backdrop = document.getElementById('sidebar-backdrop');
  sidebar.classList.toggle('open');
  if (backdrop) backdrop.classList.toggle('show', sidebar.classList.contains('open'));
};
window.closeMobileSidebar = function() {
  const sidebars = document.querySelectorAll('.sidebar');
  sidebars.forEach(s => s.classList.remove('open'));
  const backdrop = document.getElementById('sidebar-backdrop');
  if (backdrop) backdrop.classList.remove('show');
};
// Auto-close mobile sidebar on nav item clicks
document.addEventListener('click', function(e) {
  if (window.innerWidth > 768) return;
  const navItem = e.target.closest('.nav-item, .sb-item, .sb-util, .sidebar-add-btn');
  if (navItem) closeMobileSidebar();
});

</script>

</body>
</html>
