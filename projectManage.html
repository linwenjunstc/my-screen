<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM Board — 协作看板</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ── Design tokens ─────────────────────────────────────────────────────── */
  :root {
    /* Surface */
    --bg:          #f0ede6;
    --surface:     #ffffff;
    --surface2:    #f5f3ee;
    --surface3:    #ebe9e3;

    /* Borders */
    --border:      #e4e1d8;
    --border2:     #ccc9bf;

    /* Text */
    --text:        #1a1916;
    --text2:       #5c5a54;
    --text3:       #9c9a94;

    /* Accent */
    --accent:      #1a1916;
    --accent-dim:  rgba(26,25,22,.06);

    /* Semantic colours */
    --red:         #c94040;   --red-bg:    #fdf2f2;  --red-border:    #f0c8c8;
    --amber:       #a06020;   --amber-bg:  #fdf6ed;  --amber-border:  #edd8b0;
    --green:       #1e6e44;   --green-bg:  #edf7f2;  --green-border:  #a8d8bc;
    --blue:        #1a52a0;   --blue-bg:   #edf3fc;  --blue-border:   #a8c4ee;
    --purple:      #6b28d0;   --purple-bg: #f4eefa;  --purple-border: #c8a4f0;
    --teal:        #0e7268;   --teal-bg:   #edf6f5;  --teal-border:   #9acfca;

    /* Sidebar (dark) */
    --sb-bg:       #1a1916;
    --sb-bg2:      #222220;
    --sb-border:   rgba(255,255,255,.07);
    --sb-text:     #c8c5be;
    --sb-text2:    #7a7870;
    --sb-active:   rgba(255,255,255,.1);
    --sb-hover:    rgba(255,255,255,.055);

    /* Shape */
    --radius:      10px;
    --radius-sm:   6px;
    --radius-lg:   14px;

    /* Shadow */
    --shadow:      0 1px 2px rgba(0,0,0,.04), 0 3px 12px rgba(0,0,0,.05);
    --shadow-md:   0 2px 8px rgba(0,0,0,.07), 0 8px 24px rgba(0,0,0,.06);
    --shadow-modal:0 12px 48px rgba(0,0,0,.18), 0 2px 8px rgba(0,0,0,.08);

    /* Type */
    --font:        'DM Sans', -apple-system, sans-serif;
    --mono:        'DM Mono', monospace;

    /* Layout */
    --sidebar-w:   232px;
    --header-h:    56px;
  }

  /* ── Reset ─────────────────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }

  /* ── Layout ─────────────────────────────────────────────────────────────── */
  .layout { display: flex; height: 100vh; }

  /* ── Sidebar ─────────────────────────────────────────────────────────────── */
  .sidebar {
    width: var(--sidebar-w);
    flex-shrink: 0;
    background: var(--sb-bg);
    border-right: none;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-logo {
    padding: 18px 18px 14px;
    border-bottom: 1px solid var(--sb-border);
  }
  .logo-text {
    font-size: 14px;
    font-weight: 600;
    color: #f0ede6;
    letter-spacing: -.2px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-text::before {
    content: '';
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--teal);
    box-shadow: 0 0 8px var(--teal);
    flex-shrink: 0;
  }
  .logo-sub { font-size: 10px; color: var(--sb-text2); margin-top: 2px; font-family: var(--mono); letter-spacing: .04em; }

  .sidebar-date { padding: 14px 18px 6px; font-size: 9.5px; color: var(--sb-text2); font-family: var(--mono); text-transform: uppercase; letter-spacing: .1em; }
  .sidebar-nav { flex: 1; padding: 4px 10px; overflow-y: auto; }

  .nav-item {
    display: flex; align-items: center; gap: 9px;
    padding: 8px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 13px;
    color: var(--sb-text);
    transition: background .12s, color .12s;
    margin-bottom: 1px;
    user-select: none;
    border: none; background: transparent;
    width: 100%; text-align: left;
  }
  .nav-item:hover { background: var(--sb-hover); color: #f0ede6; }
  .nav-item.active { background: var(--sb-active); color: #f0ede6; font-weight: 500; }
  .nav-icon { font-size: 13px; width: 16px; text-align: center; flex-shrink: 0; opacity: .7; }
  .nav-item.active .nav-icon { opacity: 1; }
  .nav-badge {
    margin-left: auto;
    font-size: 10px; font-weight: 600;
    background: rgba(255,255,255,.12);
    color: var(--sb-text);
    padding: 1px 6px; border-radius: 20px;
    font-family: var(--mono);
  }
  .nav-item.active .nav-badge { background: rgba(255,255,255,.18); color: #f0ede6; }
  .nav-section-label {
    font-size: 9.5px; font-weight: 600;
    letter-spacing: .1em; text-transform: uppercase;
    color: var(--sb-text2);
    padding: 14px 10px 5px;
  }
  .nav-proj-wrap { position: relative; display: flex; align-items: center; }
  .nav-proj-wrap:hover .nav-edit-btn { display: flex !important; }

  .sidebar-bottom {
    padding: 10px;
    border-top: 1px solid var(--sb-border);
    display: flex; flex-direction: column; gap: 5px;
  }
  .sidebar-add-btn {
    width: 100%; padding: 9px 12px;
    border-radius: var(--radius-sm);
    background: rgba(255,255,255,.1);
    color: #f0ede6;
    border: 1px solid rgba(255,255,255,.1);
    font-family: var(--font); font-size: 13px; font-weight: 500;
    cursor: pointer;
    transition: background .15s, border-color .15s;
    display: flex; align-items: center; gap: 8px;
  }
  .sidebar-add-btn:hover { background: rgba(255,255,255,.15); border-color: rgba(255,255,255,.18); }
  .sidebar-util-btn {
    width: 100%; padding: 6px 10px;
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--sb-text2);
    border: 1px solid var(--sb-border);
    font-family: var(--font); font-size: 11.5px;
    cursor: pointer;
    transition: background .12s, color .12s;
    display: flex; align-items: center; gap: 6px;
  }
  .sidebar-util-btn:hover { background: var(--sb-hover); color: var(--sb-text); }

  /* ── Main ───────────────────────────────────────────────────────────────── */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .main-header {
    height: var(--header-h); flex-shrink: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 24px; gap: 12px;
    box-shadow: 0 1px 0 var(--border);
  }
  .main-title { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -.2px; }
  .main-subtitle { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .header-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }

  .header-search {
    display: flex; align-items: center; gap: 7px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 6px 12px;
    transition: border-color .15s, box-shadow .15s;
  }
  .header-search:focus-within { border-color: var(--border2); box-shadow: 0 0 0 3px var(--accent-dim); }
  .header-search input { border: none; background: transparent; font-family: var(--font); font-size: 13px; color: var(--text); outline: none; width: 170px; }
  .header-search input::placeholder { color: var(--text3); }
  .search-icon { color: var(--text3); font-size: 14px; }

  .main-content { flex: 1; overflow-y: auto; padding: 24px; }

  /* ── Stats ──────────────────────────────────────────────────────────────── */
  .stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 22px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 16px 18px;
    box-shadow: var(--shadow);
    transition: box-shadow .15s, transform .15s;
  }
  .stat-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .stat-label { font-size: 10px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 8px; }
  .stat-val { font-size: 26px; font-weight: 600; color: var(--text); line-height: 1; font-family: var(--mono); }
  .stat-val.red { color: var(--red); }
  .stat-val.amber { color: var(--amber); }
  .stat-val.green { color: var(--green); }

  /* ── Task groups ────────────────────────────────────────────────────────── */
  .task-group { margin-bottom: 22px; }
  .group-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .group-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .group-title { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; }
  .group-count { font-size: 11px; color: var(--text3); font-family: var(--mono); }

  /* ── Task card ──────────────────────────────────────────────────────────── */
  .task-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 13px 16px;
    display: flex; align-items: flex-start; gap: 12px;
    margin-bottom: 5px; cursor: pointer;
    transition: border-color .15s, box-shadow .15s, transform .1s;
    box-shadow: var(--shadow);
    position: relative;
  }
  .task-card::before {
    content: '';
    position: absolute; left: 0; top: 20%; bottom: 20%;
    width: 3px; border-radius: 0 2px 2px 0;
    background: transparent;
    transition: background .15s;
  }
  .task-card:hover { border-color: var(--border2); box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .task-card:hover::before { background: var(--border2); }
  .task-card.done { opacity: .48; }
  .task-card.done .task-title { text-decoration: line-through; }
  .task-card.dep-blocked { border-left: none; }
  .task-card.dep-blocked::before { background: var(--amber) !important; }

  .check-wrap { padding-top: 2px; flex-shrink: 0; }
  .check-btn {
    width: 18px; height: 18px; border-radius: 50%;
    border: 1.5px solid var(--border2);
    background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color .15s, background .15s, transform .1s;
    flex-shrink: 0;
  }
  .check-btn:hover { border-color: var(--green); transform: scale(1.1); }
  .check-btn.checked { background: var(--green); border-color: var(--green); }
  .check-btn.checked::after { content: ''; width: 4px; height: 7px; border: 1.5px solid #fff; border-top: none; border-left: none; transform: rotate(43deg) translate(-1px,-1px); }

  .task-body { flex: 1; min-width: 0; }
  .task-title { font-size: 13.5px; color: var(--text); font-weight: 400; line-height: 1.45; margin-bottom: 5px; }
  .task-meta { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
  .task-end { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }

  /* ── Pills ──────────────────────────────────────────────────────────────── */
  .pill { font-size: 11px; font-weight: 500; padding: 1px 8px; border-radius: 20px; border: 1px solid transparent; white-space: nowrap; }
  .pill-project { background: var(--surface2); color: var(--text2); border-color: var(--border); }
  .pill-red    { background: var(--red-bg);    color: var(--red);    border-color: var(--red-border);    }
  .pill-amber  { background: var(--amber-bg);  color: var(--amber);  border-color: var(--amber-border);  }
  .pill-green  { background: var(--green-bg);  color: var(--green);  border-color: var(--green-border);  }
  .pill-blue   { background: var(--blue-bg);   color: var(--blue);   border-color: var(--blue-border);   }
  .pill-gray   { background: var(--surface2);  color: var(--text3);  border-color: var(--border);        }
  .pill-purple { background: var(--purple-bg); color: var(--purple); border-color: var(--purple-border); }

  /* ── Icon buttons ───────────────────────────────────────────────────────── */
  .icon-btn {
    width: 28px; height: 28px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: transparent;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: var(--text3); font-size: 12px;
    transition: background .12s, color .12s, border-color .12s;
  }
  .icon-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--border2); }

  /* ── Filters ────────────────────────────────────────────────────────────── */
  .filter-bar { display: flex; align-items: center; gap: 5px; margin-bottom: 18px; flex-wrap: wrap; }
  .filter-chip {
    padding: 4px 13px; font-size: 12px; font-weight: 500;
    border-radius: 20px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text2);
    cursor: pointer; transition: all .13s; font-family: var(--font);
  }
  .filter-chip:hover { border-color: var(--border2); color: var(--text); background: var(--surface2); }
  .filter-chip.on { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* ── Project cards ──────────────────────────────────────────────────────── */
  .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px,1fr)); gap: 12px; }
  .project-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 20px;
    box-shadow: var(--shadow);
    transition: box-shadow .15s, transform .15s, border-color .15s;
    cursor: pointer; position: relative; overflow: hidden;
  }
  .project-card::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
    opacity: 0; transition: opacity .2s;
  }
  .project-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); border-color: var(--border2); }
  .project-card:hover::after { opacity: 1; }
  .proj-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }
  .proj-name { font-size: 14.5px; font-weight: 600; color: var(--text); line-height: 1.35; }
  .proj-actions { display: flex; gap: 4px; opacity: 0; transition: opacity .15s; }
  .project-card:hover .proj-actions { opacity: 1; }
  .progress-track { height: 4px; background: var(--surface3); border-radius: 2px; overflow: hidden; margin-bottom: 14px; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width .6s cubic-bezier(.34,1.56,.64,1); }
  .proj-stats { display: flex; gap: 14px; }
  .proj-stat { font-size: 12px; color: var(--text2); }
  .proj-stat strong { font-weight: 600; color: var(--text); }
  .proj-badges { display: flex; gap: 4px; margin-top: 12px; flex-wrap: wrap; }

  /* ── Members ────────────────────────────────────────────────────────────── */
  .member-row { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
  .member-chip { display: flex; align-items: center; gap: 5px; padding: 3px 9px 3px 5px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; font-size: 12px; color: var(--text2); }
  .member-avatar { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: #fff; flex-shrink: 0; }
  .member-tag { display: flex; align-items: center; gap: 5px; padding: 2px 8px 2px 5px; border-radius: 20px; font-size: 11px; font-weight: 500; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); }

  /* ── Tags ───────────────────────────────────────────────────────────────── */
  .tag-list { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
  .tag-chip { font-size: 11px; font-weight: 500; padding: 2px 9px; border-radius: 20px; border: 1px solid; white-space: nowrap; cursor: pointer; transition: opacity .15s; }
  .tag-chip:hover { opacity: .75; }
  .tag-chip.selected { outline: 2px solid var(--accent); outline-offset: 1px; }

  /* ── Subtasks ───────────────────────────────────────────────────────────── */
  .subtask-list { margin-top: 4px; }
  .subtask-item { display: flex; align-items: center; gap: 8px; padding: 6px 10px; background: var(--surface2); border-radius: var(--radius-sm); margin-bottom: 4px; transition: background .1s; }
  .subtask-item:hover { background: var(--surface3); }
  .subtask-check { width: 15px; height: 15px; border-radius: 3px; border: 1.5px solid var(--border2); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .15s; }
  .subtask-check:hover { border-color: var(--green); }
  .subtask-check.done { background: var(--green); border-color: var(--green); }
  .subtask-check.done::after { content: ''; width: 3px; height: 5px; border: 1.5px solid #fff; border-top: none; border-left: none; transform: rotate(43deg); }
  .subtask-text { flex: 1; font-size: 13px; color: var(--text); }
  .subtask-text.done { text-decoration: line-through; color: var(--text3); }
  .subtask-del { width: 20px; height: 20px; border: none; background: transparent; cursor: pointer; color: var(--text3); font-size: 14px; display: flex; align-items: center; justify-content: center; border-radius: 3px; opacity: 0; transition: opacity .12s; }
  .subtask-item:hover .subtask-del { opacity: 1; }
  .subtask-progress { font-size: 11px; color: var(--text3); font-family: var(--mono); }

  /* ── Deps ───────────────────────────────────────────────────────────────── */
  .dep-list { max-height: 120px; overflow-y: auto; border: 1px solid var(--border); border-radius: var(--radius-sm); }
  .dep-item { display: flex; align-items: center; gap: 8px; padding: 7px 12px; border-bottom: 1px solid var(--border); font-size: 13px; cursor: pointer; transition: background .1s; }
  .dep-item:last-child { border-bottom: none; }
  .dep-item:hover { background: var(--surface2); }
  .dep-item input[type=checkbox] { accent-color: var(--accent); }
  .dep-blocked-badge { font-size: 10px; padding: 1px 7px; background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); border-radius: 20px; }
  .recurring-badge { font-size: 10px; }
  .log-count { font-size: 10px; font-family: var(--mono); color: var(--text3); }

  /* ── Charts ─────────────────────────────────────────────────────────────── */
  .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow); }
  .chart-card.full { grid-column: 1 / -1; }
  .chart-title { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
  .chart-legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

  /* ── Project progress ───────────────────────────────────────────────────── */
  .proj-progress-list { display: flex; flex-direction: column; gap: 10px; }
  .proj-progress-row { display: flex; flex-direction: column; gap: 4px; }
  .proj-progress-label { display: flex; justify-content: space-between; font-size: 12px; }
  .proj-progress-name { color: var(--text); font-weight: 500; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .proj-progress-pct { color: var(--text3); font-family: var(--mono); }
  .proj-progress-track { height: 7px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .proj-progress-fill { height: 100%; border-radius: 4px; transition: width .6s cubic-bezier(.34,1.56,.64,1); }

  /* ── Today proj section ─────────────────────────────────────────────────── */
  .today-proj-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 20px; margin-bottom: 20px; box-shadow: var(--shadow); }
  .today-proj-title { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 12px; }

  /* ── Gantt ──────────────────────────────────────────────────────────────── */
  .gantt-wrap { overflow-x: auto; overflow-y: auto; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow); }
  .gantt-inner { display: flex; }
  .gantt-left { flex-shrink: 0; width: 200px; border-right: 1px solid var(--border); }
  .gantt-right { flex: 1; overflow-x: auto; }
  .gantt-header-row { height: 38px; background: var(--surface2); border-bottom: 1px solid var(--border); display: flex; align-items: center; }
  .gantt-name-header { height: 38px; background: var(--surface2); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .07em; }
  .gantt-row-name { height: 42px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; font-size: 13px; color: var(--text); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; cursor: pointer; transition: background .1s; }
  .gantt-row-name:hover { background: var(--surface2); }
  .gantt-row-name.done-row { opacity: .45; text-decoration: line-through; color: var(--text3); }
  .gantt-group-header { height: 30px; border-bottom: 1px solid var(--border); background: var(--surface2); display: flex; align-items: center; padding: 0 16px; font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .07em; }
  .gantt-group-header-right { height: 30px; border-bottom: 1px solid var(--border); background: var(--surface2); }

  /* ── Empty ──────────────────────────────────────────────────────────────── */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 14px; }
  .empty-icon { font-size: 30px; margin-bottom: 12px; opacity: .4; }

// ─── Loading helper ───────────────────────────────────────────
function setLoading(btn, loading) {
  if (!btn) return;
  if (loading) {
    btn._origHTML = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = `<span class="spinner"></span>处理中...`;
  } else {
    btn.disabled = false;
    if (btn._origHTML !== undefined) btn.innerHTML = btn._origHTML;

}

// ─── Storage ──────────────────────────────────────────────────────────────────


// 【读取】从云端获取最新数据
async function loadState() {
  try {
    const [tasksRes, projsRes, memsRes, tagsRes] = await Promise.all([
      sb.from('tasks').select('*'),
      sb.from('projects').select('*'),
      sb.from('members').select('*'),
      sb.from('tags').select('*')
    ]);

    if (tasksRes.error || projsRes.error) throw "读取失败";

    // 【关键修改】将数据库的下划线字段映射回代码需要的驼峰字段
    state.tasks = (tasksRes.data || []).map(t => ({
        ...t,
        projectId: t.project_id, // 映射项目ID
        createdAt: t.created_at  // 映射创建时间
    }));
    
    state.projects = (projsRes.data || []).map(p => ({
        id: p.id, name: p.name,
        colorIdx: p.color_idx || 0,
        members: p.members || []
    }));
    
    state.members = (memsRes.data || []).map(m => ({
        id: m.id,
        name: m.name,
        colorIdx: m.color_idx,
        role: m.role || 'user',
        password: m.password,
        menuPerms: m.menu_perms || null   // null = 使用角色默认权限
    }));

    state.globalTags = (tagsRes.data || []).map(tg => ({
        id: tg.id,
        name: tg.name,
        paletteIdx: tg.palette_idx // 映射标签调色盘索引
    }));
    
    // 如果云端没有标签，初始化默认标签
    if (!state.globalTags.length) {
        state.globalTags = [
            {id:'tag1',name:'设计',paletteIdx:0},{id:'tag2',name:'开发',paletteIdx:1},
            {id:'tag3',name:'运营',paletteIdx:2},{id:'tag4',name:'测试',paletteIdx:3},
        ];
    }
    
    // 角色过滤：普通用户只看自己相关的任务和项目
    if (currentUser && !isAdmin()) {
      state.tasks = state.tasks.filter(t => t.assignee === currentUser.id);
      // 只展示：(a) 自己是成员 (b) 自己是负责人 (c) 有自己的任务
      const visiblePids = new Set(state.tasks.map(t => t.projectId).filter(Boolean));
      state.projects = state.projects.filter(p =>
(p.members || []).includes(currentUser.id) ||
        visiblePids.has(p.id)
      );
    }

    updateBadges();
    render();
  } catch (err) {
    console.error(err);
    toast("获取数据失败");
  }
}

// 【保存】将单个任务的修改推送到云端
async function syncTask(t) {
  // 准备发送到数据库的数据，确保字段名是下划线形式
  const dbData = {
    ...t,
    project_id: t.projectId || t.project_id,
    created_at: t.createdAt || t.created_at
  };
  // 移除 JS 内部使用的驼峰属性，保持数据库整洁
  delete dbData.projectId;
  delete dbData.createdAt;

  const { error } = await sb.from('tasks').upsert(dbData);
  if (error) {
      console.error(error);
      toast("任务保存失败");
  }
}


async function handleCustomLogin() {
    const name = document.getElementById('login-user').value.trim();
    const pass = document.getElementById('login-pass').value;
    const errEl = document.getElementById('login-err');

    // 在数据库 members 表中查找匹配的账号和密码
    const { data: member, error } = await sb
        .from('members')
        .select('*')
        .eq('name', name)
        .eq('password', pass)
        .single();

    if (error || !member) {
        errEl.textContent = "账号或密码错误，或您尚未被添加为成员";
        return;
    }

    // 登录成功，记录状态并隐藏登录框

async function addMemberToProject(projId) {

// ─── Recurring tasks ──────────────────────────────────────────────────────────
function checkRecurringTasks() {
  const today = new Date();
  const todayStr = today.toISOString().slice(0,10);
  if (state.recurringLastGenerated === todayStr) return;
  const dow = today.getDay(); // 0=Sun,1=Mon,...
  const recurringTasks = state.tasks.filter(t => t.recurring && t.recurring.enabled && t.recurring.freq === 'weekly');
  if (recurringTasks.length === 0) { state.recurringLastGenerated = todayStr; return; }
  let generated = 0;
  recurringTasks.forEach(t => {
    const targetDow = t.recurring.dayOfWeek || 1;
    if (dow !== targetDow) return;
    // Check if we already have an instance created today
    const alreadyExists = state.tasks.some(x => x.recurringFrom === t.id && x.createdAt === todayStr);
    if (alreadyExists) return;
    // Calculate next due (same day of week, 7 days from today)
    const due = new Date(today); due.setDate(due.getDate() + 7);
    state.tasks.push({
      id: uid(), title: t.title,
      projectId: t.projectId, due: due.toISOString().slice(0,10),
      priority: t.priority, status: 'todo', logs: [], done: false,
      tags: [...(t.tags||[])], subtasks: [], dependencies: [],
      assignee: t.assignee, createdAt: todayStr,
      recurring: {enabled:false, freq:'weekly', dayOfWeek:1},
      recurringFrom: t.id,
    });
    generated++;
  });
  state.recurringLastGenerated = todayStr;
  if (generated > 0) toast(`已自动生成 ${generated} 个周期性任务`);
}

// ─── Burndown snapshot ────────────────────────────────────────────────────────
function recordBurndownSnapshot() {
  const today = new Date().toISOString().slice(0,10);
  const record = (key, remaining) => {
    if (!state.burndownLog[key]) state.burndownLog[key] = [];
    const log = state.burndownLog[key];
    if (!log.length || log[log.length-1].date !== today) {
      log.push({date: today, remaining});
      if (log.length > 60) log.splice(0, log.length - 60);
    }
  };
  record('all', state.tasks.filter(t=>!t.done).length);
  state.projects.forEach(p => record(p.id, state.tasks.filter(t=>t.projectId===p.id&&!t.done).length));
}

// ─── Export CSV ──────────────────────────────────────────────────────────────
function exportCSV() {
  const headers = ['任务名称','所属项目','负责人','截止日期','优先级','状态','标签','子任务数','子任务完成','前置依赖数','是否完成','周期性'];
  const rows = [headers];
  state.tasks.forEach(t => {
    const tagNames = (t.tags||[]).map(tid => { const tg = state.globalTags.find(x=>x.id===tid); return tg?tg.name:''; }).filter(Boolean).join('|');
    const assigneeName = t.assignee ? (state.members.find(m=>m.id===t.assignee)||{name:t.assignee}).name : '';
    const subtotalDone = (t.subtasks||[]).filter(s=>s.done).length;
    rows.push([
      t.title, projName(t.projectId), assigneeName, t.due, t.priority,
      statusInfo(t.status).lbl, tagNames,
      (t.subtasks||[]).length, subtotalDone,
      (t.dependencies||[]).length,
      t.done?'是':'否',
      (t.recurring&&t.recurring.enabled)?'是':'否'
    ]);
  });
  const csv = rows.map(r => r.map(c => `"${String(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `pm_tasks_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  toast('CSV 已导出');
}

function uid() { return 'i' + Date.now() + Math.random().toString(36).slice(2,6); }

function urgencyOf(t) {
  if (t.done) return 99;
  const today = new Date(); today.setHours(0,0,0,0);
  const due = new Date(t.due); due.setHours(0,0,0,0);
  const diff = Math.round((due-today)/86400000);
  if (diff<0) return 0; if (diff===0) return 0; if (diff<=3) return 1; if (diff<=7) return 2; return 3;
}

// 根据角色返回默认可见菜单
function getDefaultMenuPerms(role) {
  if (role === 'super_admin') return MENU_DEFS.map(m => m.key);
  if (role === 'admin') return MENU_DEFS.filter(m => !m.superOnly).map(m => m.key);
  // 普通用户默认：今日看板、全部任务、日志
  return ['today', 'tasks', 'logs'];
}

// 获取当前用户实际菜单权限
function getEffectiveMenuPerms() {
  if (!currentUser) return [];
  // super_admin 始终拥有全部权限，不受配置影响
  if (currentUser.role === 'super_admin') return MENU_DEFS.map(m => m.key);
  // 有自定义配置则用自定义
  if (currentUser.menuPerms && currentUser.menuPerms.length > 0) return currentUser.menuPerms;
  // 否则用角色默认
  return getDefaultMenuPerms(currentUser.role);
}

function applyMenuPerms() {
  const allowed = getEffectiveMenuPerms();
  document.querySelectorAll('[data-menu-key]').forEach(el => {
    const key = el.getAttribute('data-menu-key');
    el.style.display = allowed.includes(key) ? '' : 'none';

// --- 4. 初始化（本地 Session 校验 + 后台静默角色同步）---
async function init() {
  const saved = localStorage.getItem('pm_session');
  if (!saved) { window.location.href = 'login.html'; return; }

  let parsed;
  try { parsed = JSON.parse(saved); } catch(e) {
    localStorage.removeItem('pm_session');
    window.location.href = 'login.html';
    return;
  }

  // Session 过期检查（8 小时，loginAt 不存在则跳过）
  if (parsed.loginAt && (Date.now() - parsed.loginAt) > SESSION_MAX) {
    localStorage.removeItem('pm_session');
    window.location.href = 'login.html';
    return;
  }

  // Session 有效 → 立即显示主界面，不阻塞
  currentUser = { ...parsed, role: parsed.role || 'user' };

  const loader = document.getElementById('page-loader');
  const layout = document.getElementById('main-layout');
  if (loader) { loader.classList.add('fade-out'); setTimeout(() => loader.style.display = 'none', 350); }
  if (layout) layout.style.display = 'flex';

  updateUserInfoUI();
  applyMenuPerms();
  await loadState();
  initRealtime();

  // 后台静默同步角色（不影响页面正常使用）
  silentRoleSync();
}

// 后台静默更新角色信息，失败不影响任何功能
async function silentRoleSync() {
  if (!currentUser || !currentUser.id) return;
  try {
    const { data, error } = await sb
      .from('members')
      .select('id, role, color_idx, password, menu_perms')
      .eq('id', currentUser.id)
      .single();
    if (!error && data) {
      currentUser.role      = data.role       || 'user';
      currentUser.colorIdx  = data.color_idx  || 0;
      currentUser.password  = data.password   || currentUser.password;
      currentUser.menuPerms = data.menu_perms || null;
      localStorage.setItem('pm_session', JSON.stringify(currentUser));
      updateUserInfoUI();
      applyMenuPerms();  // 重新应用菜单权限
    }
  } catch(e) { /* 网络问题忽略，不影响使用 */ }
}

function dueInfo(t) {
  const today = new Date(); today.setHours(0,0,0,0);
  const due = new Date(t.due); due.setHours(0,0,0,0);
  const diff = Math.round((due-today)/86400000);
  if (diff<0) return {text:`逾期 ${-diff} 天`,cls:'pill-red'};
  if (diff===0) return {text:'今天到期',cls:'pill-red'};
  if (diff<=3) return {text:`${diff} 天后`,cls:'pill-amber'};
  if (diff<=7) return {text:`${diff} 天后`,cls:'pill-green'};
  return {text:t.due,cls:'pill-gray'};
}

  searchQuery = '';
  const inp = document.getElementById('task-search-input'); 
  if (inp) inp.value = '';
  
  updateBadges(); 
  render();
}

function onSearch(val) { searchQuery=val; render(); }

function render() {
  if (currentView==='today') renderToday();
  else if (currentView==='tasks') renderTaskList();
  else if (currentView==='projects') renderProjects();
  else if (currentView==='charts') renderCharts();
  else if (currentView==='gantt') renderGantt();
  else if (currentView.startsWith('project-')) renderProjectView(currentView.slice(8));
  else renderToday();
}

  if (state.members.length) {
    html += `<div class="today-proj-section" style="margin-bottom:24px">
      <div class="today-proj-title">负责人任务概览</div>

function buildDonutSVG(data, total) {
  const cx=90,cy=90,r=72,ir=46;
  let svg = `<svg width="180" height="180" viewBox="0 0 180 180">`;
  if (total===0) {
    svg += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#f0efe9"/><circle cx="${cx}" cy="${cy}" r="${ir}" fill="white"/><text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle" fill="#a09e98" font-size="13">暂无数据</text>`;
  } else {
    let sa = -Math.PI/2;
    data.forEach(d => {
      if (!d.count) return;
      const angle=(d.count/total)*2*Math.PI, ea=sa+angle;
      const x1=cx+r*Math.cos(sa),y1=cy+r*Math.sin(sa);
      const x2=cx+r*Math.cos(ea),y2=cy+r*Math.sin(ea);
      const xi1=cx+ir*Math.cos(ea),yi1=cy+ir*Math.sin(ea);
      const xi2=cx+ir*Math.cos(sa),yi2=cy+ir*Math.sin(sa);
      const large=angle>Math.PI?1:0;
      svg += `<path d="M${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} L${xi1},${yi1} A${ir},${ir} 0 ${large},0 ${xi2},${yi2} Z" fill="${d.color}"/>`;
      sa=ea;
    });
    const activeCnt = total - (data.find(d=>d.label==='已完成')||{count:0}).count;
    svg += `<text x="${cx}" y="${cy-9}" text-anchor="middle" fill="#1a1916" font-size="22" font-weight="600" font-family="DM Mono, monospace">${activeCnt}</text>
            <text x="${cx}" y="${cy+10}" text-anchor="middle" fill="#a09e98" font-size="11">进行中</text>`;
  }
  return svg+'</svg>';
}

function buildBurndownSVG(projId) {
  const log = state.burndownLog[projId] || [];
  const W=680, H=200, padL=44, padR=20, padT=16, padB=36;
  const chartW=W-padL-padR, chartH=H-padT-padB;

  if (log.length < 2) {
    // Not enough data - show placeholder
    let totalTasks = projId==='all' ? state.tasks.filter(t=>!t.done).length : state.tasks.filter(t=>t.projectId===projId&&!t.done).length;
    return `<div style="display:flex;align-items:center;justify-content:center;height:120px;color:var(--text3);font-size:13px;flex-direction:column;gap:6px">
      <div>当前剩余任务：<strong style="color:var(--text);font-family:var(--mono)">${totalTasks}</strong> 个</div>
      <div style="font-size:11px">数据将在多日使用后逐渐积累并展示趋势图</div>
    </div>`;
  }

  const maxVal = Math.max(...log.map(l=>l.remaining), 1);
  const minVal = 0;
  const range = maxVal - minVal || 1;

  const toX = (i) => padL + (i/(log.length-1))*chartW;
  const toY = (v) => padT + (1 - (v-minVal)/range)*chartH;

  let pointsStr = log.map((l,i) => `${toX(i)},${toY(l.remaining)}`).join(' ');
  // Fill area
  const areaPath = `M${toX(0)},${toY(log[0].remaining)} ` +
    log.map((l,i)=>`L${toX(i)},${toY(l.remaining)}`).join(' ') +
    ` L${toX(log.length-1)},${padT+chartH} L${toX(0)},${padT+chartH} Z`;

  // Y grid lines
  const yTicks = 4;
  let gridLines = '', yLabels = '';
  for (let i=0; i<=yTicks; i++) {
    const v = Math.round(minVal + (range*i/yTicks));
    const y = toY(v);
    gridLines += `<line x1="${padL}" y1="${y}" x2="${padL+chartW}" y2="${y}" stroke="#e2e0d8" stroke-width="1"/>`;
    yLabels += `<text x="${padL-6}" y="${y}" text-anchor="end" dominant-baseline="middle" fill="#a09e98" font-size="11">${v}</text>`;
  }

  // X date labels (show first, middle, last)
  let xLabels = '';
  const xLabelIdxs = [0, Math.floor((log.length-1)/2), log.length-1];
  xLabelIdxs.forEach(i => {
    if (i < log.length) xLabels += `<text x="${toX(i)}" y="${padT+chartH+18}" text-anchor="middle" fill="#a09e98" font-size="11">${log[i].date.slice(5)}</text>`;
  });

  return `<svg width="100%" viewBox="0 0 ${W} ${H}" style="display:block">
    ${gridLines}
    <path d="${areaPath}" fill="#2563a8" opacity="0.08"/>
    <polyline points="${pointsStr}" fill="none" stroke="#2563a8" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${log.map((l,i)=>`<circle cx="${toX(i)}" cy="${toY(l.remaining)}" r="3.5" fill="#2563a8"/>`).join('')}
    ${yLabels}${xLabels}
    <text x="${padL}" y="${padT-4}" fill="#a09e98" font-size="10">剩余任务数</text>
  </svg>`;
}

  document.getElementById('header-sub').textContent = '任务时间线视图';

  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = today.toISOString().slice(0,10);

  // Compute date range: from earliest task start (or -14 days) to latest due (+14 days)
  let minDate = new Date(today); minDate.setDate(minDate.getDate()-14);
  let maxDate = new Date(today); maxDate.setDate(maxDate.getDate()+30);
  state.tasks.forEach(t => {
    if (t.due) { const d=new Date(t.due); if(d>maxDate) maxDate=new Date(d); }
    if (t.createdAt) { const d=new Date(t.createdAt); if(d<minDate) minDate=new Date(d); }
  });
  maxDate.setDate(maxDate.getDate()+7);
  minDate.setDate(minDate.getDate()-3);

  const totalDays = Math.round((maxDate-minDate)/86400000)+1;
  const chartWidth = totalDays * ganttDayW;
  const todayOffset = Math.round((today-minDate)/86400000);

  // Build date header
  let dateHeaderHTML = '';
  // Month markers
  let prev = '';
  for (let i=0; i<totalDays; i++) {
    const d = new Date(minDate); d.setDate(d.getDate()+i);
    const m = d.toLocaleDateString('zh-CN',{month:'short'});
    if (m !== prev) {
      dateHeaderHTML += `<div style="position:absolute;left:${i*ganttDayW}px;top:0;bottom:0;display:flex;align-items:center;padding-left:6px;font-size:10px;color:var(--text3);font-weight:600;white-space:nowrap;pointer-events:none">${m}</div>`;
      prev=m;
    }
    // Day number every 7 days
    if (i%7===0) {
      dateHeaderHTML += `<div style="position:absolute;left:${i*ganttDayW+2}px;top:20px;font-size:9px;color:var(--text3);white-space:nowrap">${d.getDate()}</div>`;
    }
  }
  // Today marker
  dateHeaderHTML += `<div style="position:absolute;left:${todayOffset*ganttDayW}px;top:0;width:${ganttDayW}px;bottom:-9999px;background:rgba(37,99,168,.07);pointer-events:none"></div>`;
  dateHeaderHTML += `<div style="position:absolute;left:${todayOffset*ganttDayW+ganttDayW/2}px;top:0;bottom:-9999px;border-left:2px dashed #2563a8;pointer-events:none"></div>`;
  dateHeaderHTML += `<div style="position:absolute;left:${todayOffset*ganttDayW+1}px;top:2px;background:#2563a8;color:#fff;font-size:9px;padding:1px 5px;border-radius:3px;white-space:nowrap">今</div>`;

  // Grid lines every 7 days
  for (let i=0; i<totalDays; i+=7) {
    dateHeaderHTML += `<div style="position:absolute;left:${i*ganttDayW}px;top:0;bottom:-9999px;border-left:1px solid var(--border);pointer-events:none"></div>`;
  }

  // Build rows grouped by project
  let leftHTML = '<div class="gantt-name-header">任务名称</div>';
  let rightHTML = `<div class="gantt-header-row" style="position:relative;width:${chartWidth}px">${dateHeaderHTML}</div>`;

  const groups = state.projects.map(p=>({proj:p, tasks:state.tasks.filter(t=>t.projectId===p.id)}));
  const uncat = state.tasks.filter(t=>!t.projectId);
  if (uncat.length) groups.push({proj:{id:'',name:'未分类',colorIdx:8}, tasks:uncat});

  groups.forEach(g => {
    if (!g.tasks.length) return;
    const color = PROJ_COLORS[(g.proj.colorIdx||0)%PROJ_COLORS.length];
    leftHTML += `<div class="gantt-group-header" style="border-left:3px solid ${color}">${g.proj.name}</div>`;
    rightHTML += `<div class="gantt-group-header-right" style="width:${chartWidth}px"></div>`;

    g.tasks.forEach(t => {
      const startD = t.createdAt ? new Date(t.createdAt) : (() => { const d=new Date(t.due); d.setDate(d.getDate()-5); return d; })();
      const endD = new Date(t.due);
      startD.setHours(0,0,0,0); endD.setHours(0,0,0,0);
      const startOffset = Math.round((startD-minDate)/86400000);
      const durDays = Math.max(1, Math.round((endD-startD)/86400000)+1);
      const left = Math.max(0, startOffset)*ganttDayW;
      const width = Math.max(ganttDayW-4, durDays*ganttDayW-4);
      const barColor = t.done ? '#c0c0b8' : color;
      const isOverdue = !t.done && new Date(t.due)<today;
      const blocked = isBlocked(t);

      leftHTML += `<div class="gantt-row-name${t.done?' done-row':''}" onclick="openEditTask('${t.id}')" title="${t.title}">${blocked?'⚠ ':''}${t.title}</div>`;
      rightHTML += `<div style="position:relative;height:44px;border-bottom:1px solid var(--border);width:${chartWidth}px;background:${t.done?'transparent':'var(--surface)'}">
        <div title="${t.title}" onclick="openEditTask('${t.id}')" style="position:absolute;top:10px;left:${left}px;width:${width}px;height:24px;background:${barColor};opacity:${t.done?.5:1};border-radius:5px;cursor:pointer;display:flex;align-items:center;padding:0 8px;overflow:hidden;transition:opacity .15s;${isOverdue?'outline:1.5px solid var(--red);':''}" onmouseover="this.style.opacity='.75'" onmouseout="this.style.opacity='${t.done?.5:1}'">
          <span style="font-size:11px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500">${t.title}</span>
        </div>
        ${t.due===todayStr?`<div style="position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--red);font-weight:600">今</div>`:''}
      </div>`;
    });
  });

  if (!state.tasks.length) {
    leftHTML += '<div class="empty-state" style="padding:40px 16px">暂无任务</div>';
  }

  const html = `<div class="view-pane">
    <div style="margin-bottom:12px;display:flex;align-items:center;gap:8px">
      <span style="font-size:12px;color:var(--text3)">缩放：</span>
      <button class="btn btn-ghost btn-sm" onclick="setGanttZoom(20)">小</button>
      <button class="btn btn-ghost btn-sm" onclick="setGanttZoom(30)">中</button>
      <button class="btn btn-ghost btn-sm" onclick="setGanttZoom(44)">大</button>
    </div>
    <div class="gantt-wrap" id="gantt-wrap">
      <div class="gantt-inner">
        <div class="gantt-left" id="gantt-left-col">${leftHTML}</div>
        <div style="flex:1;overflow-x:auto" id="gantt-right-scroll">
          <div style="min-width:${chartWidth}px" id="gantt-right-col">${rightHTML}</div>
        </div>
      </div>
    </div>
  </div>`;
  document.getElementById('main-content').innerHTML = html;
  ganttScrollToday();
}

function setGanttZoom(w) {
  ganttDayW = w;
  renderGantt();
}

function ganttScrollToday() {
  const sc = document.getElementById('gantt-right-scroll');
  if (!sc) return;
  const today = new Date(); today.setHours(0,0,0,0);
  // Scroll to show today minus some padding
  const wrap = document.getElementById('gantt-wrap');
  if (!wrap) return;
  // Calculate approximate scroll position
  sc.scrollLeft = Math.max(0, sc.scrollLeft + (sc.querySelector('[style*="border-left:2px dashed"]') ? 0 : 300));
  // Better: find the today line element
  setTimeout(()=>{
    const todayLine = document.querySelector('[style*="border-left:2px dashed #2563a8"]');
    if (todayLine && sc) {
      const parent = sc.getBoundingClientRect();
      sc.scrollLeft = Math.max(0, (parseInt(todayLine.style.left)||0) - parent.width/3);
    }
  }, 50);
}

// ─── Task Card ────────────────────────────────────────────────────────────────
function taskCardHTML(t) {
  const di=dueInfo(t), si=statusInfo(t.status), pn=projName(t.projectId);
  const priCls=t.priority==='紧急'?'pill-red':t.priority==='重要'?'pill-amber':'pill-gray';
  const showProj = currentView!=='project-'+t.projectId;
  const blocked = isBlocked(t);
  const assigneeHTML = t.assignee ? `<div class="member-avatar" style="width:20px;height:20px;font-size:10px;background:${memberColor(t.assignee)}" title="${memberName(t.assignee)}">${memberInitial(t.assignee)}</div>` : '';
  const tagPills = (t.tags||[]).map(tid=>tagHTML(tid)).join('');
  const subProg = subtaskProgress(t);
  const recurringBadge = t.recurring&&t.recurring.enabled ? '<span class="pill pill-purple" style="font-size:10px">↻ 周期</span>' : '';
  const blockedBadge = blocked ? '<span class="dep-blocked-badge">⚠ 等待前置</span>' : '';

  return `<div class="task-card${t.done?' done':''}${blocked?' dep-blocked':''}" onclick="openEditTask('${t.id}')">
    <div class="check-wrap" onclick="event.stopPropagation();toggleDone('${t.id}')">
      <div class="check-btn${t.done?' checked':''}"></div>
    </div>
    <div class="task-body">
      <div class="task-title">${t.title}</div>
      <div class="task-meta">
        ${showProj?`<span class="pill pill-project">${pn}</span>`:''}
        <span class="pill ${di.cls}">${di.text}</span>
        <span class="pill ${priCls}">${t.priority}</span>
        <span class="pill ${si.cls}">${si.lbl}</span>
        ${tagPills}${recurringBadge}${blockedBadge}
        ${subProg}
      </div>
    </div>
    <div class="task-end" onclick="event.stopPropagation()">
      ${assigneeHTML}
      ${t.logs&&t.logs.length?`<span class="log-count">${t.logs.length}条</span>`:''}
      <button class="icon-btn" onclick="openLog('${t.id}')" title="记录跟进">+</button>
    </div>
  </div>`;
}

// ─── Toggle done ──────────────────────────────────────────────────────────────
// 修改后的样子
async function toggleDone(id) {
  const t = state.tasks.find(x => x.id === id);
  if (t) {
    t.done = !t.done;
    t.status = t.done ? 'done' : 'todo';
    await syncTask(t);
    render();
    if (t.done) logAction('完成任务', `标记「${t.title}」为已完成`);
  }
}

// ─── Subtask toggle ───────────────────────────────────────────────────────────
function toggleSubtask(taskId, subtaskId) {
  const t=state.tasks.find(x=>x.id===taskId); if(!t) return;
  const s=t.subtasks.find(x=>x.id===subtaskId); if(!s) return;
  const willDone = !s.done;
  s.done = willDone;
  syncTask(t);
  renderModalSubtasks(taskId);
  if (willDone) logAction('完成子任务', `「${t.title}」→ 子任务「${s.title}」已完成`);
}

function renderModalSubtasks(taskId) {
  const t=state.tasks.find(x=>x.id===taskId); if(!t) return;
  const el=document.getElementById('subtask-list-modal'); if(!el) return;
  el.innerHTML = buildSubtaskListHTML(t.subtasks||[], taskId);
}

function buildSubtaskListHTML(subtasks, taskId) {
  if (!subtasks.length) return '<div style="font-size:12px;color:var(--text3);padding:8px 0">暂无子任务，在下方输入框添加</div>';
  return subtasks.map(s=>`<div class="subtask-item">
    <div class="subtask-check${s.done?' done':''}" onclick="toggleSubtask('${taskId}','${s.id}')"></div>
    <div class="subtask-text${s.done?' done':''}">${s.title}</div>
    <button class="subtask-del" onclick="deleteSubtask('${taskId}','${s.id}')">×</button>
  </div>`).join('');
}

function addSubtaskFromInput(taskId) {
  const inp=document.getElementById('new-subtask-input'); if(!inp) return;
  const title=inp.value.trim(); if(!title) return;
  const t=state.tasks.find(x=>x.id===taskId); if(!t) return;
  if(!t.subtasks) t.subtasks=[];
  t.subtasks.push({id:uid(),title,done:false});
  inp.value='';
  syncTask(t);
  renderModalSubtasks(taskId);
  logAction('添加子任务', `为「${t.title}」添加子任务「${title}」`);
}

function deleteSubtask(taskId, subtaskId) {
  const t = state.tasks.find(x=>x.id===taskId); if(!t) return;
  const s = t.subtasks.find(x=>x.id===subtaskId);
  t.subtasks = t.subtasks.filter(x=>x.id!==subtaskId);
  syncTask(t);
  renderModalSubtasks(taskId);
  if (s) logAction('删除子任务', `删除「${t.title}」的子任务「${s.title}」`);
}

function openModal(html) {
  document.getElementById('modal-box').innerHTML=html;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function onOverlayClick(e) { if(e.target===document.getElementById('modal-overlay')) closeModal(); }
function modalHeader(title) {
  return `<div class="modal-header"><span class="modal-title">${title}</span><button class="modal-close" onclick="closeModal()">×</button></div>`;
}

// toggleAddTag removed: tags now use dropdown in add-task modal

async function submitAddTask(btn) {
  const titleEl = document.getElementById('fi-title');
  const title = titleEl ? titleEl.value.trim() : "";
  if (!title) { if(titleEl) titleEl.style.borderColor='var(--red)'; return; }
  setLoading(btn, true);
  
  // 增加安全检查，如果元素不存在则给默认值，防止报错
  const getVal = (id, def = "") => document.getElementById(id) ? document.getElementById(id).value : def;

  const newTask = {
    id: uid(),
    title: title,
    project_id: getVal('fi-proj'),
    assignee: getVal('fi-assignee', ''),
    due: getVal('fi-due', new Date().toISOString().slice(0,10)),
    priority: getVal('fi-pri', '重要'),
    status: getVal('fi-status', 'todo'),
    done: false,
    tags: [],
    subtasks: [],
    created_at: new Date().toISOString().slice(0,10)
  };

  await syncTask(newTask);
  setLoading(btn, false);
  closeModal();
  await loadState();
  toast('任务已同步至云端');
  logAction('添加任务', `新建任务「${title}」`);
}

// ─── Edit Task ────────────────────────────────────────────────────────────────
function openEditTask(id) {
  const t=state.tasks.find(x=>x.id===id); if(!t) return;
  activeTaskTab='basic';
  const projOpts=state.projects.map(p=>`<option value="${p.id}"${p.id===t.projectId?' selected':''}>${p.name}</option>`).join('');
  const memberOpts=state.members.map(m=>`<option value="${m.id}"${m.id===t.assignee?' selected':''}>${m.name}</option>`).join('');
  const logsHTML = t.logs&&t.logs.length
    ? t.logs.map(l=>`<div class="log-item"><div class="log-date">${l.date}</div><div class="log-text">${l.text}</div></div>`).join('')
    : '<div style="font-size:12px;color:var(--text3);padding:8px 0">暂无跟进记录</div>';

  // Tags
  const tagChipsHTML = state.globalTags.map(tg=>{
    const p=TAG_PALETTES[tg.paletteIdx%TAG_PALETTES.length];
    const sel=(t.tags||[]).includes(tg.id);
    return `<span class="tag-chip${sel?' selected':''}" id="edittag-${tg.id}" data-tagid="${tg.id}" onclick="toggleEditTag('${id}','${tg.id}')" style="background:${p.bg};color:${p.color};border-color:${p.border}">${tg.name}</span>`;
  }).join('');

  // Subtasks
  const subtaskHTML = buildSubtaskListHTML(t.subtasks||[], id);

  // Dependencies (other tasks, excluding self and done ones)
  const otherTasks = state.tasks.filter(x=>x.id!==id&&!x.done);
  const depListHTML = otherTasks.length ? otherTasks.map(x=>`<div class="dep-item">
    <input type="checkbox" ${(t.dependencies||[]).includes(x.id)?'checked':''} onchange="toggleDep('${id}','${x.id}',this.checked)">
    <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${x.title}">${x.title}</span>
    <span class="pill pill-gray" style="font-size:10px;flex-shrink:0">${projName(x.projectId)}</span>
  </div>`).join('') : '<div style="font-size:12px;color:var(--text3);padding:10px 12px">没有其他进行中的任务</div>';

  const recurringOn = t.recurring&&t.recurring.enabled;

  openModal(`${modalHeader('编辑任务')}
    <div class="modal-tabs">
      <button class="modal-tab active" id="tab-basic" onclick="switchTaskTab('basic','${id}')">基本信息</button>
      <button class="modal-tab" id="tab-sub" onclick="switchTaskTab('sub','${id}')">子任务 ${t.subtasks&&t.subtasks.length?`(${t.subtasks.filter(s=>s.done).length}/${t.subtasks.length})`:''}</button>
      <button class="modal-tab" id="tab-dep" onclick="switchTaskTab('dep','${id}')">依赖 ${t.dependencies&&t.dependencies.length?`(${t.dependencies.length})`:''}</button>
      <button class="modal-tab" id="tab-log" onclick="switchTaskTab('log','${id}')">记录 ${t.logs&&t.logs.length?`(${t.logs.length})`:''}</button>
    </div>

    <div class="modal-body" id="task-tab-content">
      <div id="tab-pane-basic">
        <div class="form-group"><label class="form-label">任务名称</label><input class="form-input" id="fi-title" value="${t.title.replace(/"/g,'&quot;')}"></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">所属项目</label><select class="form-select" id="fi-proj"><option value="">未分类</option>${projOpts}</select></div>
          <div class="form-group"><label class="form-label">负责人</label><select class="form-select" id="fi-assignee"><option value="">未分配</option>${memberOpts}</select></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">截止日期</label><input class="form-input" type="date" id="fi-due" value="${t.due}"></div>
          <div class="form-group"><label class="form-label">优先级</label><select class="form-select" id="fi-pri"><option${t.priority==='紧急'?' selected':''}>紧急</option><option${t.priority==='重要'?' selected':''}>重要</option><option${t.priority==='普通'?' selected':''}>普通</option></select></div>
        </div>
        <div class="form-group"><label class="form-label">状态</label><select class="form-select" id="fi-status"><option value="todo"${t.status==='todo'?' selected':''}>待启动</option><option value="doing"${t.status==='doing'?' selected':''}>进行中</option><option value="waiting"${t.status==='waiting'?' selected':''}>待反馈</option><option value="done"${t.status==='done'?' selected':''}>已完成</option></select></div>
        ${state.globalTags.length?`<div class="form-group"><label class="form-label">标签</label><div class="tag-list">${tagChipsHTML}</div></div>`:''}
        <div class="toggle-row">
          <div><div class="toggle-label">周期性任务</div><div class="toggle-sub">每周一自动生成新实例</div></div>
          <button class="toggle${recurringOn?' on':''}" id="fi-recurring" onclick="this.classList.toggle('on')"></button>
        </div>
      </div>
      <div id="tab-pane-sub" style="display:none">
        <div class="form-label" style="margin-bottom:10px">子任务清单</div>
        <div class="subtask-list" id="subtask-list-modal">${subtaskHTML}</div>
        <div style="display:flex;gap:8px;margin-top:10px">
          <input class="form-input" id="new-subtask-input" placeholder="输入子任务..." onkeydown="if(event.key==='Enter')addSubtaskFromInput('${id}')">
          <button class="btn btn-ghost btn-sm" onclick="addSubtaskFromInput('${id}')">+</button>
        </div>
      </div>
      <div id="tab-pane-dep" style="display:none">
        <div class="form-label" style="margin-bottom:8px">前置依赖任务</div>
        <div class="form-hint" style="margin-bottom:10px">勾选的任务完成后，本任务才会解除"等待前置"状态</div>
        <div class="dep-list">${depListHTML}</div>
      </div>
      <div id="tab-pane-log" style="display:none">
        ${logsHTML}
        <button class="btn btn-ghost" style="width:100%;margin-top:6px;font-size:12px" onclick="closeModal();openLog('${t.id}')">+ 记录新跟进</button>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-danger" onclick="confirmDeleteTask('${t.id}')">删除任务</button>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="submitEditTask('${t.id}', this)">保存</button>
      </div>
    </div>`);
}

function switchTaskTab(tab, taskId) {
  ['basic','sub','dep','log'].forEach(t => {
    const btn=document.getElementById('tab-'+t);
    const pane=document.getElementById('tab-pane-'+t);
    if (btn) btn.classList.toggle('active', t===tab);
    if (pane) pane.style.display = t===tab?'block':'none';
  });
  activeTaskTab = tab;
}

async function saveState(idOrType) {
    // 1. 如果传入的是某个任务的 ID，同步该任务到云端
    if (typeof idOrType === 'string' && idOrType.startsWith('i')) {
        const task = state.tasks.find(t => t.id === idOrType);
        if (task) await syncTask(task);
    } 
    // 2. 如果是通用保存，我们目前采用“本地备份+重要数据云同步”策略
    localStorage.setItem('pm_local_settings', JSON.stringify({
        members: state.members,
        globalTags: state.globalTags
    }));
    
    // 刷新页面显示
    updateBadges();
    render();
}

function toggleEditTag(taskId, tagId) {
  const t=state.tasks.find(x=>x.id===taskId); if(!t) return;
  if(!t.tags) t.tags=[];
  const idx=t.tags.indexOf(tagId);
  if (idx>=0) t.tags.splice(idx,1); else t.tags.push(tagId);
  saveState();
  const el=document.getElementById('edittag-'+tagId);
  if (el) el.classList.toggle('selected', t.tags.includes(tagId));
}

function toggleDep(taskId, depId, checked) {
  const t = state.tasks.find(x=>x.id===taskId); if(!t) return;
  const depTask = state.tasks.find(x=>x.id===depId);
  if(!t.dependencies) t.dependencies=[];
  if (checked && !t.dependencies.includes(depId)) {
    t.dependencies.push(depId);
    syncTask(t);
    if (depTask) logAction('设置前置条件', `「${t.title}」的前置条件设为「${depTask.title}」`);
  } else if (!checked) {
    t.dependencies = t.dependencies.filter(x=>x!==depId);
    syncTask(t);
    if (depTask) logAction('移除前置条件', `移除「${t.title}」的前置条件「${depTask.title}」`);
  }
}

}

async function confirmDeleteTask(id) {

// 添加项目成员
async function addMemberToProject(projId) {
  const sel = document.getElementById('proj-add-member-sel'); 
  if (!sel || !sel.value) return;
  const p = state.projects.find(x => x.id === projId); 
  if (!p) return;
  
  if (!p.members) p.members = [];
  if (!p.members.includes(sel.value)) {
    p.members.push(sel.value);
    // 【关键】调用云端同步函数
    await syncProject(p); 
    // 重新打开弹窗以刷新显示
    openEditProject(projId); 
    toast('成员已加入项目并同步');
  }
}

// 移除项目成员
async function removeMemberFromProject(projId, memberId) {
  const p = state.projects.find(x => x.id === projId); 
  if (!p) return;
  
  p.members = p.members.filter(x => x !== memberId);
  // 【关键】同步修改到云端
  await syncProject(p); 
  openEditProject(projId); 
  toast('成员已移除');
}

  // 1. 从云端删除项目
  const success = await deleteFromCloud('projects', id);

// 提交添加成员（包含密码同步到云端）
async function submitAddMember() {
  const nameInp = document.getElementById('new-member-name');
  const passInp = document.getElementById('new-member-pass');
  const name = nameInp.value.trim();
  const pass = passInp.value.trim();

  if (!name || !pass) {
    toast("姓名和密码不能为空");
    return;
  }

  // 查重：防止添加同名账号
  if (state.members.some(m => m.name === name)) {
    toast("该姓名已存在，请更换");
    return;
  }

  const newMember = {
    id: uid(),
    name: name,
    password: pass, // 存储明文密码供自定义登录校验
    colorIdx: state.members.length % MEMBER_COLORS.length
  };

  // 1. 同步到 Supabase (对应 SQL 里的 color_idx)
  const addBtn = document.querySelector('#members-modal-add-btn');
  setLoading(addBtn, true);
  const { error } = await sb.from('members').upsert({
    id: newMember.id,
    name: newMember.name,
    password: newMember.password,
    color_idx: newMember.colorIdx,
    role: 'user'
  });
  setLoading(addBtn, false);

  if (error) {
    console.error(error);
    toast("成员同步失败，请检查数据库权限");
  } else {
    state.members.push(newMember);
    nameInp.value = '';
    passInp.value = '';
    const listEl = document.getElementById('members-list');
    if (listEl) listEl.innerHTML = buildMembersListHTML();
    toast('成员已成功加入云端');
    logAction('添加成员', `新增成员「${newMember.name}」`);
  }
}

// 移除成员
async function deleteMember(id) {
  const m = state.members.find(x => x.id === id);
  if (!m) return;
  
  // 安全检查：如果成员还有任务，不建议直接删除
  const taskCnt = state.tasks.filter(t => t.assignee === id).length;
  if (taskCnt > 0) {
    toast(`无法删除：${m.name} 还有 ${taskCnt} 个任务未处理`);
    return;
  }

  if (!confirm(`确定要从协作团队中移除「${m.name}」吗？该成员将无法再登录。`)) return;

  // 从云端删除
  const { error } = await sb.from('members').delete().eq('id', id);
  
  if (error) {
    toast("删除失败");
  } else {
    state.members = state.members.filter(x => x.id !== id);
    const listEl = document.getElementById('members-list');
    if (listEl) listEl.innerHTML = buildMembersListHTML();
    toast('成员已移除');
    logAction('删除成员', `移除成员「${m.name}」`);
  }
}

      : `<button onclick="deleteMember('${m.id}')" title="删除成员" style="width:20px;height:20px;border:none;background:transparent;cursor:pointer;color:var(--text3);font-size:14px;display:flex;align-items:center;justify-content:center;border-radius:3px;flex-shrink:0;transition:color .15s" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--text3)'">×</button>`);
    return `<div class="subtask-item" style="${hasTask?'border-left:2px solid var(--border2);':''}">
      <div class="member-avatar" style="background:${MEMBER_COLORS[m.colorIdx%MEMBER_COLORS.length]}">${m.name.slice(0,1)}</div>

        <div style="font-size:13px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          ${m.name}
          ${isMe ? '<span style="font-size:10px;color:var(--green)">(你)</span>' : ''}
        </div>
        <div style="margin-top:3px;display:flex;align-items:center;gap:4px">
          ${roleHTML}
          <span style="font-size:11px;color:var(--text3)">${taskCnt} 个任务</span>
        </div>
      </div>
      ${delBtn}
    </div>`;
  }).join('');
}

async function submitAddTag(btn) {
  const inp = document.getElementById('new-tag-name');
  if (!inp) return;
  const name = inp.value.trim();
  if (!name) return;
  setLoading(btn, true);
  const newTag = { id: uid(), name, paletteIdx: state.globalTags.length % TAG_PALETTES.length };
  await syncTag(newTag);
  state.globalTags.push(newTag);
  setLoading(btn, false);
  inp.value = '';
  document.getElementById('tags-list').innerHTML = buildTagsListHTML();
  toast('标签已添加');
  logAction('添加标签', `新建标签「${name}」`);
}

function openTagsModal() {

        <div style="display:flex;gap:8px">
          <input class="form-input" id="new-tag-name" placeholder="输入标签名称" onkeydown="if(event.key==='Enter')submitAddTag()">

      <div></div>

function buildTagsListHTML() {
  if (!state.globalTags.length) return '<div style="font-size:13px;color:var(--text3);padding:8px 0">暂无标签，请在下方添加</div>';
  return state.globalTags.map(tg => {
    const p = TAG_PALETTES[tg.paletteIdx % TAG_PALETTES.length];
    const usedCount = state.tasks.filter(t => t.tags && t.tags.includes(tg.id)).length;
    return `<div id="tag-row-${tg.id}" class="subtask-item" style="gap:10px">
      <span style="width:10px;height:10px;border-radius:50%;background:${p.dot};flex-shrink:0;margin-top:2px"></span>
      <div style="flex:1;min-width:0">
        <div id="tag-label-${tg.id}" style="font-size:13px;font-weight:500">${tg.name}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">使用中：${usedCount} 个任务</div>
      </div>
      <button onclick="startEditTag('${tg.id}')" title="重命名" style="border:none;background:transparent;cursor:pointer;color:var(--text3);font-size:13px;padding:4px 6px;border-radius:4px;transition:color .15s" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text3)'">✎</button>
      <button onclick="deleteTag('${tg.id}')" title="删除标签" style="border:none;background:transparent;cursor:pointer;color:var(--text3);font-size:14px;padding:4px 6px;border-radius:4px;transition:color .15s" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--text3)'">×</button>
    </div>`;
  }).join('');
}

function startEditTag(id) {
  const tg = state.globalTags.find(x => x.id === id);
  if (!tg) return;
  const labelEl = document.getElementById('tag-label-' + id);
  if (!labelEl) return;
  labelEl.innerHTML = `<input id="tag-edit-inp-${id}" value="${tg.name}" style="width:100%;padding:3px 6px;border:1px solid var(--border-glow);border-radius:4px;font-size:13px;outline:none;background:var(--surface2)" onkeydown="if(event.key==='Enter')confirmEditTag('${id}');if(event.key==='Escape')cancelEditTag('${id}','${tg.name}')">
  <div style="display:flex;gap:6px;margin-top:5px">
    <button onclick="confirmEditTag('${id}')" class="btn btn-primary" style="font-size:11px;padding:3px 10px">确认</button>
    <button onclick="cancelEditTag('${id}','${tg.name}')" class="btn btn-ghost" style="font-size:11px;padding:3px 8px">取消</button>
  </div>`;
  setTimeout(() => {
    const inp = document.getElementById('tag-edit-inp-' + id);
    if (inp) { inp.focus(); inp.select(); }
  }, 50);
}

function cancelEditTag(id, origName) {
  const labelEl = document.getElementById('tag-label-' + id);
  if (labelEl) labelEl.innerHTML = origName;
}

async function confirmEditTag(id) {
  const inp = document.getElementById('tag-edit-inp-' + id);
  if (!inp) return;
  const newName = inp.value.trim();
  if (!newName) return;
  const tg = state.globalTags.find(x => x.id === id);
  if (!tg) return;
  tg.name = newName;
  await syncTag(tg);
  document.getElementById('tags-list').innerHTML = buildTagsListHTML();
  toast('标签已更新');
  logAction('编辑标签', `标签重命名为「${newName}」`);
}

async function deleteTag(id) {
  const tg = state.globalTags.find(x => x.id === id);
  if (!tg) return;
  const usedCount = state.tasks.filter(t => t.tags && t.tags.includes(id)).length;
  const msg = usedCount > 0
    ? `标签「${tg.name}」被 ${usedCount} 个任务使用，删除后这些任务将失去该标签。确认删除？`
    : `确认删除标签「${tg.name}」？`;
  if (!confirm(msg)) return;
  const { error } = await sb.from('tags').delete().eq('id', id);
  if (error) { toast('删除失败'); return; }
  state.globalTags = state.globalTags.filter(t => t.id !== id);
  state.tasks.forEach(t => { if (t.tags) t.tags = t.tags.filter(x => x !== id); });
  document.getElementById('tags-list').innerHTML = buildTagsListHTML();
  toast('标签已删除');
  logAction('删除标签', `删除标签「${tg.name}」`);
}

function openRoleManageModal() {
  if (!isAdmin()) { toast('无权限'); return; }
  openModal(`${modalHeader('角色权限管理')}
    <div class="modal-body" style="padding-bottom:0">
      <div style="font-size:12px;color:var(--text2);margin-bottom:14px;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);line-height:1.6">
        <strong>权限层级：</strong>超级管理员 &gt; 管理员 &gt; 普通用户<br>
        只能修改比自己级别低的成员角色，并为其配置可见菜单。
      </div>

function buildRoleManageListHTML() {
  const myLevel = getRoleLevel(currentUser?.role || 'user');
  return state.members.map(m => {
    const isMe = currentUser && m.id === currentUser.id;
    const role = m.role || 'user';
    const targetLevel = getRoleLevel(role);
    const canEdit = !isMe && myLevel > targetLevel;

    // 可以升级到哪些角色
    const roleOptions = Object.entries(ROLE_LEVELS)
      .filter(([r]) => getRoleLevel(r) < myLevel)  // 只能设置比自己低的
      .sort((a, b) => b[1] - a[1])
      .map(([r]) => `<option value="${r}" ${role===r?'selected':''}>${ROLE_LABELS[r]}</option>`)
      .join('');

    return `<div class="subtask-item" style="align-items:flex-start;gap:10px;padding:10px">
      <div class="member-avatar" style="width:32px;height:32px;font-size:13px;background:${MEMBER_COLORS[m.colorIdx % MEMBER_COLORS.length]};flex-shrink:0;margin-top:2px">${m.name.slice(0,1)}</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px">
          <span style="font-size:13px;font-weight:500">${m.name}</span>
          ${isMe ? '<span style="font-size:10px;color:var(--green)">(你)</span>' : ''}
          <span class="role-badge role-${role}">${ROLE_LABELS[role] || role}</span>
        </div>
        ${canEdit ? `
        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:6px">
          <select class="form-select" id="role-sel-${m.id}" style="font-size:12px;padding:4px 8px;height:28px;width:120px">
            ${roleOptions}
          </select>
          <button onclick="applyRoleChange('${m.id}')" class="btn btn-ghost btn-sm" style="font-size:11px;height:28px;padding:0 10px">应用角色</button>
          <button onclick="openMenuPermsModal('${m.id}')" class="btn btn-ghost btn-sm" style="font-size:11px;height:28px;padding:0 10px;color:var(--blue);border-color:var(--blue-border)">⚙ 菜单权限</button>
          <button onclick="adminResetPassword('${m.id}','${m.name}')" class="btn btn-ghost btn-sm" style="font-size:11px;height:28px;padding:0 10px;color:var(--amber);border-color:var(--amber-border)">🔑 重置密码</button>
        </div>` : `<div style="font-size:11px;color:var(--text3);margin-top:4px">
          ${isMe ? '当前登录账号' : '无权限修改此成员'}</div>`}
      </div>
    </div>`;
  }).join('');
}

async function applyRoleChange(memberId) {
  const m = state.members.find(x => x.id === memberId);
  if (!m) return;
  const sel = document.getElementById('role-sel-' + memberId);
  if (!sel) return;
  const newRole = sel.value;
  if (newRole === m.role) return;

  // 权限检查
  if (!canManageRole(currentUser.role, newRole)) {
    toast('无权限设置此角色'); return;
  }

  const { error } = await sb.from('members').update({ role: newRole }).eq('id', memberId);
  if (error) { toast('更新失败：' + error.message); return; }
  m.role = newRole;
  document.getElementById('role-manage-list').innerHTML = buildRoleManageListHTML();
  toast(`✓ 已将「${m.name}」设为${ROLE_LABELS[newRole]}`);
  logAction('修改角色', `将「${m.name}」设为${ROLE_LABELS[newRole]}`);
}

// ─── Menu Permission Modal ────────────────────────────────────────────────────
function openMenuPermsModal(memberId) {
  const m = state.members.find(x => x.id === memberId);
  if (!m) return;
  if (!canManageRole(currentUser.role, m.role || 'user')) {
    toast('无权限修改此成员的菜单'); return;
  }

  // 当前成员的有效权限（用于预选 checkbox）
  const currentPerms = m.menuPerms && m.menuPerms.length
    ? m.menuPerms
    : getDefaultMenuPerms(m.role || 'user');

  // 过滤出该成员可配置的菜单项
  // adminOnly 的菜单只有 admin+ 才能被配置拥有，普通用户不能拥有 adminOnly 菜单
  const targetIsAdmin = getRoleLevel(m.role || 'user') >= 2;
  const configurableMenus = MENU_DEFS.filter(md => {
    if (md.adminOnly && !targetIsAdmin) return false;  // 普通用户不能有管理菜单
    return true;
  });

  const itemsHTML = configurableMenus.map(md => {
    const isChecked = currentPerms.includes(md.key);
    const isRequired = md.required;
    return `<label class="perm-item ${isChecked ? 'checked' : ''} ${isRequired ? 'locked' : ''}"
      onclick="${isRequired ? '' : `togglePermItem(this, '${md.key}')`}" style="${isRequired ? 'cursor:not-allowed' : ''}">
      <div class="perm-check ${isChecked ? 'on' : ''}" id="pcheck-${md.key}"></div>
      <span>${md.icon} ${md.label}</span>
      ${isRequired ? '<span style="font-size:10px;color:var(--text3);margin-left:auto">必选</span>' : ''}
    </label>`;
  }).join('');

  openModal(`${modalHeader(`配置菜单权限 · ${m.name}`)}
    <div class="modal-body">
      <div style="font-size:12px;color:var(--text2);margin-bottom:14px;padding:8px 12px;background:var(--surface2);border-radius:var(--radius-sm);border:1px solid var(--border)">
        为 <strong>${m.name}</strong>（${ROLE_LABELS[m.role || 'user']}）配置可见的菜单项。必选项不可取消。
      </div>
      <div class="perm-grid" id="perm-grid-${memberId}">
        ${itemsHTML}
      </div>
      <div style="margin-top:12px;display:flex;gap:8px">
        <button class="btn btn-ghost btn-sm" onclick="resetMenuPermsToDefault('${memberId}')">恢复默认</button>
        <button class="btn btn-ghost btn-sm" onclick="selectAllMenuPerms('${memberId}', true)">全部勾选</button>
        <button class="btn btn-ghost btn-sm" onclick="selectAllMenuPerms('${memberId}', false)">全部取消</button>
      </div>
    </div>
    <div class="modal-footer">
      <div style="font-size:11px;color:var(--text3)" id="perm-tip">勾选后点击保存生效</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost" onclick="openRoleManageModal()">返回</button>
        <button class="btn btn-primary" onclick="saveMenuPerms('${memberId}', this)">保存权限</button>
      </div>
    </div>`);

  // 存储当前编辑的权限状态
  window._editingPerms = { memberId, perms: [...currentPerms] };
}

function togglePermItem(labelEl, key) {
  if (!window._editingPerms) return;
  const perms = window._editingPerms.perms;
  const idx = perms.indexOf(key);
  const checkEl = labelEl.querySelector('.perm-check');
  if (idx >= 0) {
    perms.splice(idx, 1);
    labelEl.classList.remove('checked');
    checkEl.classList.remove('on');
  } else {
    perms.push(key);
    labelEl.classList.add('checked');
    checkEl.classList.add('on');
  }
}

function resetMenuPermsToDefault(memberId) {
  const m = state.members.find(x => x.id === memberId);
  if (!m) return;
  window._editingPerms.perms = getDefaultMenuPerms(m.role || 'user');
  openMenuPermsModal(memberId);
}

function selectAllMenuPerms(memberId, selectAll) {
  if (!window._editingPerms) return;
  const m = state.members.find(x => x.id === memberId);
  if (!m) return;
  const targetIsAdmin = getRoleLevel(m.role || 'user') >= 2;
  const available = MENU_DEFS
    .filter(md => !(md.adminOnly && !targetIsAdmin))
    .map(md => md.key);
  const required = MENU_DEFS.filter(md => md.required).map(md => md.key);
  window._editingPerms.perms = selectAll ? [...available] : [...required];
  openMenuPermsModal(memberId);
}

async function saveMenuPerms(memberId, btn) {
  if (!window._editingPerms || window._editingPerms.memberId !== memberId) return;
  const m = state.members.find(x => x.id === memberId);
  if (!m) return;

  // 确保必选项始终存在
  const required = MENU_DEFS.filter(md => md.required).map(md => md.key);
  const finalPerms = [...new Set([...required, ...window._editingPerms.perms])];

  setLoading(btn, true);
  const { error } = await sb.from('members').update({ menu_perms: finalPerms }).eq('id', memberId);
  setLoading(btn, false);

  if (error) { toast('保存失败：' + error.message); return; }

  m.menuPerms = finalPerms;
  // 如果改的是自己，立即生效
  if (currentUser && currentUser.id === memberId) {
    currentUser.menuPerms = finalPerms;
    localStorage.setItem('pm_session', JSON.stringify(currentUser));
    applyMenuPerms();
  }

  toast(`✓ 已更新「${m.name}」的菜单权限`);
  logAction('配置菜单权限', `为「${m.name}」配置了 ${finalPerms.length} 项菜单权限`);
  openRoleManageModal();
}

async function adminResetPassword(memberId, memberName) {
  const DEFAULT_PWD = '123456';
  // 弹窗确认
  const confirmed = confirm(
    `⚠️ 重置密码确认

即将把「${memberName}」的登录密码重置为：${DEFAULT_PWD}

请提醒该用户登录后及时修改密码。

确认重置？`
  );
  if (!confirmed) return;
  const { error } = await sb.from('members').update({ password: DEFAULT_PWD }).eq('id', memberId);
  if (error) { toast('重置失败：' + error.message); return; }
  // 如果重置的是自己，同步更新本地 session
  if (currentUser && currentUser.id === memberId) {
    currentUser.password = DEFAULT_PWD;
    localStorage.setItem('pm_session', JSON.stringify(currentUser));
  }
  toast(`✓ 「${memberName}」的密码已重置为 ${DEFAULT_PWD}`);
  logAction('重置密码', `管理员重置了「${memberName}」的密码`);
}

function getLogBadgeColor(action) {
  if (['添加任务','添加子任务','添加项目','添加成员','添加标签'].includes(action))
    return { bg: 'var(--green-bg)', text: 'var(--green)', border: 'var(--green-border)' };
  if (['完成任务','完成子任务'].includes(action))
    return { bg: 'var(--blue-bg)', text: 'var(--blue)', border: 'var(--blue-border)' };
  if (['删除任务','删除子任务','删除项目','删除成员','删除标签'].includes(action))
    return { bg: 'var(--red-bg)', text: 'var(--red)', border: 'var(--red-border)' };
  if (['修改角色','重置密码','修改密码','用户登录'].includes(action))
    return { bg: 'var(--purple-bg)', text: 'var(--purple)', border: 'var(--purple-border)' };
  if (['设置前置条件','移除前置条件'].includes(action))
    return { bg: 'var(--amber-bg)', text: 'var(--amber)', border: 'var(--amber-border)' };
  return { bg: 'var(--surface2)', text: 'var(--text2)', border: 'var(--border)' };
}

async function logAction(action, detail) {
  if (!currentUser) return;
  try {
    await sb.from('logs').insert({
      id: uid(),
      user_id: currentUser.id,
      user_name: currentUser.name,
      action,
      detail: detail || '',
      created_at: new Date().toISOString()
    });
  } catch(e) { /* 日志写入失败不影响主功能 */ }
}
