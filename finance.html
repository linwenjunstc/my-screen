<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>资金计划 — PM Board</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0ede6;--surface:#fff;--surface2:#f5f3ee;--surface3:#ebe9e3;
  --border:#e4e1d8;--border2:#ccc9bf;
  --text:#1a1916;--text2:#5c5a54;--text3:#9c9a94;
  --accent:#1a1916;--accent-dim:rgba(26,25,22,.06);
  --red:#c94040;--red-bg:#fdf2f2;--red-border:#f0c8c8;
  --amber:#a06020;--amber-bg:#fdf6ed;--amber-border:#edd8b0;
  --green:#1e6e44;--green-bg:#edf7f2;--green-border:#a8d8bc;
  --blue:#1a52a0;--blue-bg:#edf3fc;--blue-border:#a8c4ee;
  --purple:#6b28d0;--purple-bg:#f4eefa;--purple-border:#c8a4f0;
  --teal:#0e7268;
  --sb-bg:#1a1916;--sb-border:rgba(255,255,255,.07);
  --sb-text:#c8c5be;--sb-text2:#7a7870;
  --sb-active:rgba(255,255,255,.1);--sb-hover:rgba(255,255,255,.055);
  --radius:10px;--radius-sm:6px;--radius-lg:14px;
  --shadow:0 1px 2px rgba(0,0,0,.04),0 3px 12px rgba(0,0,0,.05);
  --shadow-md:0 2px 8px rgba(0,0,0,.07),0 8px 24px rgba(0,0,0,.06);
  --shadow-modal:0 12px 48px rgba(0,0,0,.18),0 2px 8px rgba(0,0,0,.08);
  --font:'DM Sans',-apple-system,sans-serif;
  --mono:'DM Mono',monospace;
  --sidebar-w:204px;--header-h:56px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
.layout{display:flex;height:100vh}
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--sb-bg);display:flex;flex-direction:column;overflow:hidden}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.sb-logo{padding:16px 16px 12px;border-bottom:1px solid var(--sb-border)}
.sb-logo-text{font-size:13px;font-weight:600;color:#f0ede6;display:flex;align-items:center;gap:7px}
.sb-logo-text::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--teal);box-shadow:0 0 6px var(--teal);flex-shrink:0}
.sb-sub{font-size:10px;color:var(--sb-text2);margin-top:2px;font-family:var(--mono)}
.sb-section{font-size:9.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--sb-text2);padding:12px 14px 4px}
.sb-nav{flex:1;padding:4px 8px;overflow-y:auto}
.sb-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:var(--radius-sm);cursor:pointer;font-size:12.5px;color:var(--sb-text);transition:background .12s,color .12s;margin-bottom:1px;border:none;background:transparent;width:100%;text-align:left}
.sb-item:hover{background:var(--sb-hover);color:#f0ede6}
.sb-item.active{background:var(--sb-active);color:#f0ede6;font-weight:500}
.sb-item svg{width:13px;height:13px;opacity:.65;flex-shrink:0}
.sb-item.active svg{opacity:1}
.sb-bottom{padding:10px 8px;border-top:1px solid var(--sb-border);display:flex;flex-direction:column;gap:5px}
.sb-util{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--radius-sm);font-size:12px;color:var(--sb-text2);cursor:pointer;background:transparent;border:1px solid var(--sb-border);width:100%;transition:all .12s;font-family:var(--font)}
.sb-util:hover{background:var(--sb-hover);color:var(--sb-text)}
.month-picker{padding:8px 8px 4px;display:flex;flex-direction:column;gap:4px}
.month-label{font-size:9.5px;color:var(--sb-text2);font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;padding:0 2px}
.month-select{background:rgba(255,255,255,.07);border:1px solid var(--sb-border);border-radius:var(--radius-sm);color:var(--sb-text);font-family:var(--mono);font-size:11px;padding:5px 8px;outline:none;cursor:pointer;width:100%}
.month-select option{background:#2a2926;color:var(--sb-text)}
.main-header{height:var(--header-h);flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px}
.main-title{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-.2px}
.main-sub{font-size:11px;color:var(--text3);margin-top:1px}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.main-content{flex:1;overflow-y:auto;padding:20px 24px}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px}
.table-toolbar{padding:12px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.table-title{font-size:13px;font-weight:600;color:var(--text)}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead th{position:sticky;top:0;background:var(--surface2);padding:9px 12px;text-align:left;font-size:10.5px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;border-bottom:1px solid var(--border);z-index:2}
thead th.num{text-align:right}
tbody td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text);white-space:nowrap;vertical-align:middle}
tbody td.num{text-align:right;font-family:var(--mono);font-size:12px}
tbody tr:last-child td{border-bottom:none}
tbody tr.clickable:hover td{background:var(--surface2);cursor:pointer}
.tfoot-row td{background:var(--surface2);font-weight:600;font-family:var(--mono);font-size:12px;border-top:2px solid var(--border);text-align:right;padding:9px 12px;white-space:nowrap}
.tfoot-row td:first-child{text-align:left}
.ratio-cell{display:flex;align-items:center;gap:8px;min-width:110px}
.ratio-bar-wrap{flex:1;height:5px;background:var(--surface3);border-radius:3px;overflow:hidden}
.ratio-bar{height:100%;border-radius:3px;transition:width .4s}
.ratio-text{font-family:var(--mono);font-size:11px;min-width:38px;text-align:right;font-weight:500}
.ratio-green .ratio-text{color:var(--green)}.ratio-green .ratio-bar{background:var(--green)}
.ratio-amber .ratio-text{color:var(--amber)}.ratio-amber .ratio-bar{background:var(--amber)}
.ratio-red .ratio-text{color:var(--red)}.ratio-red .ratio-bar{background:var(--red)}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:500;border:1px solid transparent;white-space:nowrap}
.tag-cash{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-border)}
.tag-supply{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-border)}
.tag-auto{background:var(--surface2);color:var(--text3);font-style:italic;font-size:11px}
.tag-up{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.tag-active{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.tag-settled{background:var(--surface2);color:var(--text3);border-color:var(--border)}
.unit{font-size:10px;color:var(--text3);margin-left:2px}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;box-shadow:var(--shadow)}
.stat-card.warning{border-color:var(--red-border);background:var(--red-bg)}
.stat-card.positive{border-color:var(--green-border);background:var(--green-bg)}
.stat-label{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:8px}
.stat-val{font-size:24px;font-weight:600;font-family:var(--mono);color:var(--text);line-height:1}
.stat-card.warning .stat-val{color:var(--red)}
.stat-card.positive .stat-val{color:var(--green)}
.stat-sub{font-size:11px;color:var(--text3);margin-top:5px}
.sec-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px}
.sec-head{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sec-head-title{font-size:12px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px}
.sec-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
.sb-income{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.sb-expense{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.sb-fund{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.t1-table{width:100%;border-collapse:collapse}
.t1-table td{padding:9px 18px;border-bottom:1px solid var(--border);font-size:13px}
.t1-table tr:last-child td{border-bottom:none}
.t1-num{text-align:right;font-family:var(--mono);font-size:12.5px;font-weight:500}
.t1-auto{color:var(--text3);font-style:italic;font-size:12px}
.t1-total td{background:var(--surface2);font-weight:600;border-top:2px solid var(--border)!important}
.cmp-pos{color:var(--green);font-family:var(--mono);font-size:12px}
.cmp-neg{color:var(--red);font-family:var(--mono);font-size:12px}
.prog-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;box-shadow:var(--shadow);margin-bottom:14px}
.prog-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.prog-row{display:flex;align-items:center;gap:12px;padding:7px 0;border-bottom:1px solid var(--border)}
.prog-row:last-child{border-bottom:none}
.prog-name{font-size:12.5px;font-weight:500;color:var(--text);flex:0 0 180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prog-meta{font-size:11px;color:var(--text3);flex:0 0 150px;text-align:right;font-family:var(--mono)}
.prog-bar-wrap{flex:1;height:7px;background:var(--surface3);border-radius:4px;overflow:hidden}
.prog-bar{height:100%;border-radius:4px;transition:width .5s}
.prog-pct{font-family:var(--mono);font-size:11px;font-weight:500;min-width:40px;text-align:right}
.btn{padding:7px 14px;font-size:12.5px;font-weight:500;font-family:var(--font);border-radius:var(--radius-sm);cursor:pointer;transition:all .13s;border:1px solid transparent}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{opacity:.84}
.btn-ghost{background:transparent;color:var(--text2);border-color:var(--border)}
.btn-ghost:hover{background:var(--surface2);color:var(--text);border-color:var(--border2)}
.btn-danger{background:transparent;color:var(--red);border-color:var(--red-border)}
.btn-danger:hover{background:var(--red-bg)}
.btn-green{background:transparent;color:var(--green);border-color:var(--green-border)}
.btn-green:hover{background:var(--green-bg)}
.btn:disabled{opacity:.6;cursor:not-allowed;pointer-events:none}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.32);display:none;align-items:flex-start;justify-content:center;padding-top:52px;z-index:200;backdrop-filter:blur(3px)}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);width:100%;max-width:560px;box-shadow:var(--shadow-modal);max-height:calc(100vh - 80px);overflow-y:auto;animation:modalIn .16s cubic-bezier(.22,1,.36,1)}
.modal.modal-lg{max-width:680px}
@keyframes modalIn{from{opacity:0;transform:translateY(-10px) scale(.98)}to{opacity:1;transform:none}}
.modal-header{padding:18px 22px 0;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:15px;font-weight:600;color:var(--text)}
.modal-close{width:26px;height:26px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;cursor:pointer;font-size:15px;color:var(--text3);display:flex;align-items:center;justify-content:center;transition:all .12s;line-height:1}
.modal-close:hover{background:var(--surface2);color:var(--text)}
.modal-body{padding:18px 22px}
.modal-footer{padding:14px 22px 18px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border)}
.modal-footer-right{display:flex;gap:8px}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.form-input,.form-select,.form-textarea{width:100%;padding:8px 11px;font-size:13px;font-family:var(--font);border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--border2);box-shadow:0 0 0 3px var(--accent-dim)}
.form-input:disabled,.form-select:disabled{background:var(--surface2);color:var(--text3);cursor:not-allowed}
.form-textarea{resize:vertical;min-height:60px;line-height:1.5}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-divider{font-size:10.5px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:8px 0 5px;border-bottom:1px solid var(--border);margin-bottom:12px}
.form-hint{font-size:11px;color:var(--text3);margin-top:4px}
.readonly-val{font-size:13px;padding:8px 11px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text3);font-style:italic}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:5px;flex-shrink:0}
.toast{position:fixed;bottom:20px;right:20px;background:var(--sb-bg);color:#f0ede6;padding:10px 16px;border-radius:var(--radius);font-size:13px;box-shadow:0 4px 20px rgba(0,0,0,.25);z-index:300;opacity:0;transform:translateY(6px);transition:all .2s;pointer-events:none;border:1px solid rgba(255,255,255,.08)}
.toast.show{opacity:1;transform:none}
#page-loader{position:fixed;inset:0;background:var(--sb-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:14px;transition:opacity .35s}
#page-loader.fade-out{opacity:0;pointer-events:none}
#page-loader .loader-ring{width:32px;height:32px;border:2.5px solid rgba(255,255,255,.1);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite}
#page-loader .loader-text{font-size:12px;color:var(--sb-text2);font-family:var(--mono);letter-spacing:.05em}
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-icon{font-size:28px;opacity:.35;margin-bottom:10px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.sb-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12)}
.linked-badge{font-size:10px;padding:1px 7px;border-radius:20px;background:#edf7f2;color:#1e6e44;border:1px solid #a8d8bc;font-style:normal;white-space:nowrap}
</style>
</head>
<body>
<div id="page-loader">
  <div class="loader-ring"></div>
  <div class="loader-text">LOADING...</div>
</div>
<div class="layout" id="main-layout" style="display:none">
  <aside class="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-text">PM Board</div>
      <div class="sb-sub" id="sb-dept-name">资金计划模块</div>
    </div>
    <div class="month-picker">
      <div class="month-label">月份</div>
      <select class="month-select" id="month-select" onchange="onMonthChange(this.value)"></select>
    </div>
    <div class="sb-section">计划报表</div>
    <nav class="sb-nav">
      <button class="sb-item active" id="tab-t1" onclick="switchTab('t1')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="14" height="14" rx="2"/><line x1="1" y1="5.5" x2="15" y2="5.5"/><line x1="1" y1="9.5" x2="15" y2="9.5"/></svg>月度资金计划
      </button>
      <button class="sb-item" id="tab-receipt" onclick="switchTab('receipt')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="1,12 5,7 8,10 11,6 15,3"/></svg>对上收款台账
      </button>
      <button class="sb-item" id="tab-payment" onclick="switchTab('payment')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="14" height="10" rx="2"/><line x1="1" y1="7" x2="15" y2="7"/></svg>对下付款计划
      </button>
      <button class="sb-item" id="tab-t4" onclick="switchTab('t4')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="2,12 5,8 8,10 11,5 14,3"/><line x1="2" y1="13" x2="14" y2="13"/></svg>完成情况
      </button>
      <button class="sb-item" id="tab-t5" onclick="switchTab('t5')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><polyline points="8,5 8,8 10,10"/></svg>实际收款明细
      </button>
      <button class="sb-item" id="tab-t6" onclick="switchTab('t6')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><polyline points="8,5 8,8 6,10"/></svg>实际支付明细
      </button>
      <button class="sb-item" id="tab-dashboard" onclick="switchTab('dashboard')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="9" width="4" height="6" rx="1"/><rect x="6" y="5" width="4" height="10" rx="1"/><rect x="11" y="1" width="4" height="14" rx="1"/></svg>资金看板
      </button>
      <div class="sb-section" style="padding-top:8px">基础库</div>
      <button class="sb-item" id="tab-contracts" onclick="switchTab('contracts')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 2h10v12H3z"/><line x1="5" y1="5.5" x2="11" y2="5.5"/><line x1="5" y1="8" x2="11" y2="8"/></svg>合同库
      </button>
      <button class="sb-item" id="tab-customers" onclick="switchTab('customers')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="6" r="3"/><path d="M2 14c0-3 2.7-5 6-5s6 2 6 5"/></svg>客户库
      </button>
      <button class="sb-item" id="tab-suppliers" onclick="switchTab('suppliers')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="6" width="10" height="8" rx="1"/><path d="M4 6V4a4 4 0 0 1 8 0v2"/></svg>供应商库
      </button>
    </nav>
    <div class="sb-bottom">
      <button class="sb-util" onclick="openSettingsModal()">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="2.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2"/></svg>系统配置
      </button>
      <button class="sb-util" onclick="location.href='projectManage.html'">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="8,2 4,6 8,10"/></svg>返回主系统
      </button>
    </div>
  </aside>
  <main class="main">
    <header class="main-header">
      <div>
        <div class="main-title" id="header-title">月度资金计划</div>
        <div class="main-sub" id="header-sub"></div>
      </div>
      <div class="header-right">
        <span id="user-label" style="font-size:12px;color:var(--text3)"></span>
        <button class="btn btn-green btn-sm" onclick="exportXlsx()">↓ 导出 Excel</button>
        <button class="btn btn-primary btn-sm" id="add-btn" onclick="openAddModal()" style="display:none">+ 新增</button>
      </div>
    </header>
    <div class="main-content" id="main-content"></div>
  </main>
</div>
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-box" onclick="event.stopPropagation()"></div>
</div>
<div class="toast" id="toast"></div>
<script>

function initMonthPicker(){

//  Computed 
function getLinkedPrevReceived(pay){
  // 对下付款的「截至上期累计已收款」= 关联对上合同的 prev_received
  if(!pay.downstream_contract_id)return null;
  const cdn=state.contractsDown.find(c=>c.id===pay.downstream_contract_id);
  if(!cdn||!cdn.upstream_contract_id)return null;
  const recRow=state.receipts.find(r=>r.upstream_contract_id===cdn.upstream_contract_id);
  return recRow!=null?+(recRow.prev_received||0):null;
}
function computePrevBalance(){
  // 优先用上月表五/表六实际数；无则退到计划数
  const t5=state.prevActualReceipts.reduce((s,r)=>s+(+r.amount||0),0);
  const t6=state.prevActualPayments.reduce((s,r)=>s+(+r.amount||0),0);
  const ps=state.prevSummary;
  if(t5>0||t6>0){
    const nonProj=(+ps.actual_labor||0)+(+ps.actual_dept||0)+(+ps.actual_amortization||0)+(+ps.actual_company_lock||0)+(+ps.actual_debt_service||0);
    return t5-(t6+nonProj);
  }
  const prevPlanPay=state.prevPayments.reduce((s,r)=>s+(+r.plan_cash||0)+(+r.plan_supply_chain||0),0);
  const prevPlanRec=state.prevReceipts.reduce((s,r)=>s+(+r.plan_amount||0),0);
  const prevPlanExp=prevPlanPay+(+ps.labor_cost||0)+(+ps.dept_cost||0)+(+ps.amortization||0)+(+ps.company_lock||0)+(+ps.debt_service||0);
  return prevPlanRec-prevPlanExp;
}
function computeTotals(){
  const sm=state.summary;
  const planPay=state.payments.reduce((s,r)=>s+(+r.plan_cash||0)+(+r.plan_supply_chain||0),0);
  const planRec=state.receipts.reduce((s,r)=>s+(+r.plan_amount||0),0);
  const extraTot=state.extras.reduce((s,r)=>s+(+r.amount||0),0);
  const prevBal=computePrevBalance();
  const totalExp=planPay+(+sm.labor_cost||0)+(+sm.dept_cost||0)+(+sm.amortization||0)+(+sm.company_lock||0)+(+sm.debt_service||0)+extraTot;
  const totalInc=planRec+prevBal;
  const surplus=totalInc-totalExp;
  const funding=(+sm.shareholder_injection||0)+(+sm.shareholder_loan||0)+(+sm.working_capital_loan||0)+(+sm.supply_chain_finance||0);
  return{planPay,planRec,extraTot,prevBal,totalExp,totalInc,surplus,funding};
}

//  Format helpers 
function fmt(n){
  if(n===null||n===undefined||n==='')return '—';
  const v=+n;if(isNaN(v))return '—';
  return v.toLocaleString('zh-CN',{minimumFractionDigits:0,maximumFractionDigits:2});
}
function pctClass(ratio){return ratio>=1?'ratio-red':ratio>=0.8?'ratio-amber':'ratio-green';}
function ratioCell(paid,total){
  const ratio=total?(+paid||0)/(+total):0;
  const cls=pctClass(ratio);
  const w=Math.min(ratio*100,100).toFixed(1);
  const pctStr=total?((ratio)*100).toFixed(1)+'%':'0%';
  return `<div class="ratio-cell ${cls}"><div class="ratio-bar-wrap"><div class="ratio-bar" style="width:${w}%"></div></div><div class="ratio-text">${pctStr}</div></div>`;
}

    data={labor_cost:+q('t1-lc')||0,dept_cost:+q('t1-dc')||0,
      amortization:+q('t1-am')||0,company_lock:+q('t1-cl')||0,debt_service:+q('t1-ds')||0};

async function upsertSummary(data,ym){
  ym=ym||currentMonth;
  const sm=ym===currentMonth?state.summary:state.prevSummary;

function onPaymentContractChange(){
  const sel=document.getElementById('p-cdn');
  if(!sel.value){
    document.getElementById('p-prev-rec').textContent='— 关联对上合同后自动带入';
    return;
  }
  const c=state.contractsDown.find(x=>x.id===sel.value);
  if(!c)return;
  document.getElementById('p-cname').value=c.name||'';
  document.getElementById('p-total').value=c.amount||0;
  if(c.supplier_id)document.getElementById('p-sup').value=c.supplier_id;
  if(c.supplier_name)document.getElementById('p-sup-txt').value=c.supplier_name;
  // 联动：找关联对上合同的 prev_received
  if(c.upstream_contract_id){
    const upRec=state.receipts.find(r2=>r2.upstream_contract_id===c.upstream_contract_id);
    if(upRec)document.getElementById('p-prev-rec').textContent=fmt(upRec.prev_received||0)+' 元（来自对上合同）';
    else document.getElementById('p-prev-rec').textContent='— 本月未找到对应收款记录';
  }
  calcPaymentRatio();
}
function calcPaymentRatio(){
  const cash=+document.getElementById('p-cash')?.value||0;
  const supply=+document.getElementById('p-supply')?.value||0;
  const cum=+document.getElementById('p-cum')?.value||0;
  const total=+document.getElementById('p-total')?.value||0;
  const sub=cash+supply;
  const actEl=document.getElementById('p-actual');
  const actPaid=actEl?parseFloat(actEl.textContent)||0:0;
  const subEl=document.getElementById('p-plan-sub');
  if(subEl)subEl.textContent=fmt(sub)+' 元';
  const rcEl=document.getElementById('p-ratio-cur');
  if(rcEl)rcEl.textContent=sub?((actPaid/sub)*100).toFixed(1)+'%':'—';
  const rcumEl=document.getElementById('p-ratio-cum');
  if(rcumEl)rcumEl.textContent=total&&cum?((cum/total)*100).toFixed(1)+'%':'—';
}
async function savePayment(id,btn){
  const name=document.getElementById('p-cname').value.trim();
  if(!name){document.getElementById('p-cname').style.borderColor='var(--red)';return;}
  setLoading(btn,true);

  const data={

    contract_amount:+q('p-total')||0,
    plan_cash:+q('p-cash')||0, plan_supply_chain:+q('p-supply')||0,
    cumulative_paid:+q('p-cum')||0,
    remark:q('p-remark'),

async function saveT6(id,btn){
  const name=q('t6-cname').trim();
  if(!name){document.getElementById('t6-cname').style.borderColor='var(--red)';return;}
  const amt=+q('t6-amount');
  if(!amt){document.getElementById('t6-amount').style.borderColor='var(--red)';return;}
  setLoading(btn,true);
  const supSel=document.getElementById('t6-sup').value;
  const supName=supSel?(state.suppliers.find(s=>s.id===supSel)||{}).name||q('t6-sup-txt'):q('t6-sup-txt');
  const data={
    year_month:currentMonth, contract_name:name,
    supplier_name:supName,
    downstream_contract_id:document.getElementById('t6-cdn').value||null,
    payment_date:q('t6-date')||null, amount:amt,
    remark:q('t6-remark'),
    creator_id:currentUser.id, creator_name:currentUser.name
  };
  if(id){
    await sb.from('actual_payments').update({...data,updated_at:new Date().toISOString()}).eq('id',id);
    const i=state.actualPayments.findIndex(x=>x.id===id);
    if(i>=0)state.actualPayments[i]={...state.actualPayments[i],...data};
  } else {
    const row={id:'ap'+uid(),...data,created_at:new Date().toISOString()};
    await sb.from('actual_payments').insert(row);
    state.actualPayments.push(row);
  }
  setLoading(btn,false);closeModal();render();toast(`✓ ${id?'已更新':'已添加'}`);
  logAction(id?'更新实际支付':'新增实际支付', `${id?'更新':'新增'}支付「${name}」，金额 ${amt} 元`);
}

function renderDashboard(){

  const actPay=state.actualPayments.reduce((s,r)=>s+(+r.amount||0),0);
  const recRatio=c.planRec?((actRec/c.planRec)*100).toFixed(1):0;
  const payRatio=c.planPay?((actPay/c.planPay)*100).toFixed(1):0;
  document.getElementById('main-content').innerHTML=`
  <div class="stat-grid">
    <div class="stat-card ${c.surplus>=0?'positive':'warning'}">
      <div class="stat-label">资金溢缺</div>

    </div>
    <div class="stat-card">
      <div class="stat-label">计划收入</div>

    </div>
    <div class="stat-card">
      <div class="stat-label">计划支出</div>
      <div class="stat-val">${fmt(c.planPay)}</div>

    ${state.receipts.map(r=>{

      return `<div class="prog-row">

        <div class="prog-meta">${fmt(r.cumulative_received)} / ${fmt(r.contract_amount)} 元</div>

        <div class="prog-bar-wrap"><div class="prog-bar" style="width:${Math.min(ratio*100,100).toFixed(1)}%;background:var(--${cls==='ratio-green'?'green':cls==='ratio-amber'?'amber':'red'})"></div></div>

      </div>`;
    }).join('')||'<div style="color:var(--text3);font-size:12px;padding:8px 0">暂无付款计划</div>'}

async function saveContract(dir,id,btn){
  const name=q('ct-name').trim();
  if(!name){document.getElementById('ct-name').style.borderColor='var(--red)';return;}
  setLoading(btn,true);
  const isUp=dir==='up';
  let data={name,amount:+q('ct-amount')||0,status:q('ct-status'),remark:q('ct-remark')};
  if(isUp){
    const cuId=document.getElementById('ct-cu').value;
    data.customer_id=cuId||null;
    data.customer_name=cuId?(state.customers.find(c=>c.id===cuId)||{}).name||q('ct-cu-txt'):q('ct-cu-txt');
    data.sign_date=q('ct-date')||null;
  } else {
    const suId=document.getElementById('ct-su').value;
    data.supplier_id=suId||null;
    data.supplier_name=suId?(state.suppliers.find(s=>s.id===suId)||{}).name||q('ct-su-txt'):q('ct-su-txt');
    data.upstream_contract_id=document.getElementById('ct-up').value||null;
  }
  const tbl=isUp?'contracts_upstream':'contracts_downstream';
  const arr=isUp?state.contractsUp:state.contractsDown;
  if(id){
    await sb.from(tbl).update({...data,updated_at:new Date().toISOString()}).eq('id',id);
    const i=arr.findIndex(x=>x.id===id);
    if(i>=0)arr[i]={...arr[i],...data};
  } else {
    const row={id:(isUp?'cu':'cd')+uid(),...data,created_at:new Date().toISOString()};
    await sb.from(tbl).insert(row);
    arr.push(row);
  }
  setLoading(btn,false);closeModal();render();toast(`✓ ${id?'已更新':'已添加'}`);
  logAction(id?'更新'+(isUp?'对上合同':'对下合同'):'新增'+(isUp?'对上合同':'对下合同'), `「${name}」`);
}

function openAddSupplierModal(){openEditSupplierModal(null);}
function openEditSupplierModal(id){

  const isEdit=!!r;
  openModal(`
  <div class="modal-header">
    <div class="modal-title">${isEdit?'编辑供应商':'新增供应商'}</div>
    <button class="modal-close" onclick="closeModal()">×</button>
  </div>
  <div class="modal-body">
    <div class="form-row">
      <div class="form-group"><label class="form-label">供应商名称 *</label><input class="form-input" id="su-name" value="${r?r.name||'':''}"></div>
      <div class="form-group"><label class="form-label">简称</label><input class="form-input" id="su-short" value="${r?r.short_name||'':''}"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">联系人</label><input class="form-input" id="su-contact" value="${r?r.contact||'':''}"></div>
      <div class="form-group"><label class="form-label">联系电话</label><input class="form-input" id="su-phone" value="${r?r.phone||'':''}"></div>
    </div>
    <div class="form-group"><label class="form-label">备注</label><input class="form-input" id="su-remark" value="${r?r.remark||'':''}"></div>
  </div>
  <div class="modal-footer">
    ${isEdit?`<button class="btn btn-danger btn-sm" onclick="deleteRow('suppliers','${r.id}')">删除</button>`:'<div></div>'}
    <div class="modal-footer-right">
      <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveSupplier(${isEdit?`'${r.id}'`:'null'},this)">${isEdit?'保存':'创建'}</button>
    </div>
  </div>`);
}
async function saveSupplier(id,btn){
  const name=q('su-name').trim();
  if(!name){document.getElementById('su-name').style.borderColor='var(--red)';return;}
  setLoading(btn,true);
  const data={name,short_name:q('su-short'),contact:q('su-contact'),phone:q('su-phone'),remark:q('su-remark')};
  if(id){
    await sb.from('suppliers').update({...data,updated_at:new Date().toISOString()}).eq('id',id);
    const i=state.suppliers.findIndex(x=>x.id===id);
    if(i>=0)state.suppliers[i]={...state.suppliers[i],...data};
  } else {
    const row={id:'su'+uid(),...data,created_at:new Date().toISOString()};
    await sb.from('suppliers').insert(row);
    state.suppliers.push(row);
  }
  setLoading(btn,false);closeModal();render();toast(`✓ ${id?'已更新':'已添加'}`);
  logAction(id?'更新供应商':'新增供应商', `「${name}」`);
}

//  删除通用 
async function deleteRow(table,id){
  if(!confirm('确认删除该条记录？此操作不可撤销。'))return;
  await sb.from(table).delete().eq('id',id);
  // 同步本地 state
  const tblMap={
    payment_plans:'payments', receipt_records:'receipts',
    actual_receipts:'actualReceipts', actual_payments:'actualPayments',
    contracts_upstream:'contractsUp', contracts_downstream:'contractsDown',
    customers:'customers', suppliers:'suppliers'
  };
  const key=tblMap[table];
  if(key&&state[key])state[key]=state[key].filter(x=>x.id!==id);
  closeModal();render();toast('✓ 已删除');
}

//  Excel 导出（第4步完成完整版，此处为预留入口）
function exportXlsx(){
  const wb=XLSX.utils.book_new();
  const c=computeTotals();
  const sm=state.summary;

  // Sheet1: 月度资金计划 T1
  const t1Data=[
    ['月度资金计划',`${fmtMon(currentMonth)}`,'',''],
    ['类别','项目','计划金额（元）','说明'],
    ['支出','人工费用',sm.labor_cost||0,''],
    ['支出','项目支出',c.planPay,'对下付款合计'],
    ['支出','部门费用',sm.dept_cost||0,''],
    ['支出','摊销费用',sm.amortization||0,''],
    ['支出','公司锁定',sm.company_lock||0,''],
    ['支出','还本付息',sm.debt_service||0,''],
    ['','支出合计',c.totalExp,''],
    ['收入','项目回款',c.planRec,'对上收款合计'],
    ['收入','上月结余',c.prevBal,'自动结转'],
    ['','收入合计',c.totalInc,''],
    ['','资金溢缺',c.surplus,'收入-支出'],
  ];
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(t1Data),'月度资金计划');

  // Sheet2: 对上收款台账 T2
  const t2Head=['#','项目/合同名称','客户名称','合同金额','确认产值','截至上期累计已回款','本月计划回款','本期累计已回款','预计下次收款','备注'];
  const t2Data=[t2Head,...state.receipts.map((r,i)=>[i+1,r.contract_name,r.customer_name,r.contract_amount,r.confirmed_output,r.prev_received,r.plan_amount,r.cumulative_received,r.next_expected_date,r.remark])];
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(t2Data),'对上收款台账');

  // Sheet3: 对下付款计划 T3
  const t3Head=['#','项目/合同名称','供应商','合同金额','本月计划现金','本月计划供应链','本月小计','本月实际支付','本期累计已支付','备注'];
  const t3Data=[t3Head,...state.payments.map((r,i)=>{
    const act=getActualPaidForPayment(r);
    return [i+1,r.contract_name,r.supplier_name,r.contract_amount,r.plan_cash,r.plan_supply_chain,(+r.plan_cash||0)+(+r.plan_supply_chain||0),act,r.cumulative_paid,r.remark];
  })];
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(t3Data),'对下付款计划');

  // Sheet4: 完成情况 T4
  const actRec=state.actualReceipts.reduce((s,r)=>s+(+r.amount||0),0);
  const actPay=state.actualPayments.reduce((s,r)=>s+(+r.amount||0),0);
  const t4Data=[
    ['完成情况','计划','实际','差异'],
    ['项目回款',c.planRec,actRec,actRec-c.planRec],
    ['人工费用',sm.labor_cost||0,sm.actual_labor||0,(sm.actual_labor||0)-(sm.labor_cost||0)],
    ['项目支出',c.planPay,actPay,actPay-c.planPay],
    ['部门费用',sm.dept_cost||0,sm.actual_dept||0,(sm.actual_dept||0)-(sm.dept_cost||0)],
    ['摊销费用',sm.amortization||0,sm.actual_amortization||0,(sm.actual_amortization||0)-(sm.amortization||0)],
    ['公司锁定',sm.company_lock||0,sm.actual_company_lock||0,(sm.actual_company_lock||0)-(sm.company_lock||0)],
    ['还本付息',sm.debt_service||0,sm.actual_debt_service||0,(sm.actual_debt_service||0)-(sm.debt_service||0)],
  ];
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(t4Data),'完成情况');

  // Sheet5: 实际收款明细 T5
  const t5Head=['#','收款日期','合同/项目名称','客户名称','收款金额','备注'];
  const t5Data=[t5Head,...state.actualReceipts.map((r,i)=>[i+1,r.receipt_date,r.contract_name,r.customer_name,r.amount,r.remark])];
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(t5Data),'实际收款明细');

  // Sheet6: 实际支付明细 T6
  const t6Head=['#','支付日期','合同/项目名称','供应商名称','支付金额','备注'];
  const t6Data=[t6Head,...state.actualPayments.map((r,i)=>[i+1,r.payment_date,r.contract_name,r.supplier_name,r.amount,r.remark])];
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(t6Data),'实际支付明细');

  XLSX.writeFile(wb,`资金计划_${currentMonth}.xlsx`);
  toast('✓ 已导出 Excel（6张 Sheet）');
  logAction('导出资金报表', `导出 ${fmtMon(currentMonth)} 资金计划 Excel`);
}

    <div class="form-group"><label class="form-label">事业部名称</label><input class="form-input" id="cfg-dept" value="${state.config.dept_name||''}"></div>

async function saveSettings(btn){
  setLoading(btn,true);
  const d={id:'default',company_name:q('cfg-company'),dept_name:q('cfg-dept'),updated_at:new Date().toISOString()};
  await sb.from('finance_config').upsert(d);
  state.config=d;document.getElementById('sb-dept-name').textContent=d.dept_name||'资金计划模块';
  setLoading(btn,false);closeModal();toast('✓ 配置已保存');
}
//  操作日志（写入 projectManage 共用的 logs 表）
async function logAction(action, detail) {
  if (!currentUser) return;
  try {
    await sb.from('logs').insert({
      id: uid(), user_id: currentUser.id, user_name: currentUser.name,
      action, detail: detail || '', created_at: new Date().toISOString()
    });
  } catch(e) { /* 日志写入失败不影响主功能 */ }
}
function openModal(html,cls=''){
  const b=document.getElementById('modal-box');
  b.className='modal'+(cls?' '+cls:'');
  b.innerHTML=html;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function toast(m){
  const el=document.getElementById('toast');
  el.textContent=m;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}
function setLoading(btn,on){
  if(!btn)return;
  if(on){btn._o=btn.innerHTML;btn.disabled=true;btn.innerHTML='<span class="spinner"></span>处理中...';}
  else{btn.disabled=false;if(btn._o!==undefined)btn.innerHTML=btn._o;}
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
window.onload=init;
