	<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #eef2f7;
  --surface:   #ffffff;
  --surface2:  #f7f9fc;
  --surface3:  #edf0f6;
  --border:    #e3e8f0;
  --border2:   #c8cdd6;
  --text:      #0f172a;
  --text2:     #475569;
  --text3:     #94a3b8;
  --accent:    #2563eb;
  --accent-dim: rgba(37,99,235,.07); --teal: #0ea5e9; --teal-bg: #f0f9ff;
  --accent-dim2: rgba(37,99,235,.1);
  --red:       #ef4444;
  --red-bg:    #fef2f2;
  --red-border:#fecaca;
  --green:     #10b981;
  --sb-bg:     #0f172a;
  --sb-border: rgba(255,255,255,.07);
  --sb-text:   #94a3b8;
  --sb-text2:  #64748b;
  --font:      'DM Sans', -apple-system, 'PingFang SC', sans-serif;
  --mono:      'DM Mono', monospace;
  --radius-sm: 6px;
  --radius:    10px;
  --radius-lg: 14px;
  --shadow:    0 1px 3px rgba(0,0,0,.04), 0 4px 14px rgba(0,0,0,.05);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.1), 0 2px 8px rgba(0,0,0,.06);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
  position: relative;
}

/* ── 背景纹理（与主页 sidebar 同款暗色块 + 暖色纸张底）──────────────── */
.bg-left {
  position: fixed;
  left: 0; top: 0; bottom: 0;
  width: 42%;
  background: var(--sb-bg);
  z-index: 0;
  /* 微妙的噪点质感 */
  background-image:
    radial-gradient(ellipse 80% 60% at 20% 50%, rgba(37,99,235,.12) 0%, transparent 70%),
    radial-gradient(ellipse 60% 80% at 80% 80%, rgba(37,99,235,.06) 0%, transparent 60%);
}
.bg-right {
  position: fixed;
  right: 0; top: 0; bottom: 0;
  width: 58%;
  background: var(--bg);
  z-index: 0;
}
/* 分隔线光晕 */
.bg-left::after {
  content: '';
  position: absolute;
  right: -1px; top: 10%; bottom: 10%;
  width: 1px;
  background: linear-gradient(to bottom,
    transparent,
    rgba(37,99,235,.4) 30%,
    rgba(37,99,235,.6) 50%,
    rgba(37,99,235,.4) 70%,
    transparent
  );
}

/* 浮动装饰点 */
.dot {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
}
.dot-1 {
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(37,99,235,.15) 0%, transparent 70%);
  top: -80px; left: -80px;
  animation: floatA 14s ease-in-out infinite;
}
.dot-2 {
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(14,114,104,.08) 0%, transparent 70%);
  bottom: 0; left: 20%;
  animation: floatB 18s ease-in-out infinite;
}
.dot-3 {
  width: 240px; height: 240px;
  background: radial-gradient(circle, rgba(240,237,230,.6) 0%, transparent 70%);
  top: -60px; right: 10%;
  animation: floatA 16s ease-in-out infinite reverse;
}
@keyframes floatA {
  0%, 100% { transform: translate(0, 0); }
  33%       { transform: translate(20px, 30px); }
  66%       { transform: translate(-10px, 15px); }
}
@keyframes floatB {
  0%, 100% { transform: translate(0, 0); }
  50%       { transform: translate(30px, -20px); }
}

/* ── 左侧品牌区 ─────────────────────────────────────────────────── */
.brand-panel {
  position: fixed;
  left: 0; top: 0; bottom: 0;
  width: 42%;
  z-index: 5;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px;
  gap: 0;
}

.brand-logo {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 56px; height: 56px;
  margin-bottom: 24px;
  position: relative;
}
.brand-logo svg {
  width: 56px; height: 56px;
  position: relative;
  z-index: 1;
}
.brand-logo-ring {
  position: absolute;
  inset: -8px;
  border-radius: 50%;
  border: 1px solid rgba(37,99,235,.25);
  animation: logoPulse 3s ease-in-out infinite;
}
.brand-logo-ring-2 {
  inset: -16px;
  border-color: rgba(37,99,235,.1);
  animation-delay: .6s;
}
@keyframes logoPulse {
  0%, 100% { opacity: .5; transform: scale(1); }
  50%       { opacity: 1; transform: scale(1.04); }
}

.brand-name {
  font-size: 22px;
  font-weight: 600;
  color: #f0ede6;
  letter-spacing: -.3px;
  margin-bottom: 8px;
  text-align: center;
}
.brand-sub {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--sb-text2);
  letter-spacing: .12em;
  text-align: center;
  margin-bottom: 40px;
}

/* 系统状态指示 */
.status-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 100%;
  max-width: 200px;
}
.status-item {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--sb-text2);
  letter-spacing: .04em;
}
.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent);
  flex-shrink: 0;
  animation: dotBlink 2.5s ease-in-out infinite;
}
.status-dot.amber {
  background: #a06020;
  box-shadow: 0 0 6px #a06020;
  animation-delay: .5s;
}
.status-dot.blue {
  background: #1a52a0;
  box-shadow: 0 0 6px #1a52a0;
  animation-delay: 1s;
}
@keyframes dotBlink {
  0%, 100% { opacity: .5; }
  50%       { opacity: 1; }
}
.status-bar-fill {
  flex: 1;
  height: 1px;
  background: linear-gradient(to right, rgba(255,255,255,.08), transparent);
}

.brand-version {
  position: absolute;
  bottom: 28px;
  font-family: var(--mono);
  font-size: 9px;
  color: var(--sb-text2);
  letter-spacing: .08em;
  opacity: .6;
}

/* ── 右侧登录表单 ────────────────────────────────────────────────── */
.form-panel {
  position: fixed;
  right: 0; top: 0; bottom: 0;
  width: 58%;
  z-index: 5;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 48px;
}

.card {
  width: 100%;
  max-width: 380px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 38px 36px;
  box-shadow: var(--shadow-lg);
  animation: cardIn .4s cubic-bezier(.22,1,.36,1) both;
  position: relative;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(20px) scale(.98); }
  to   { opacity: 1; transform: none; }
}

/* 卡片顶部 teal 线 */
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 20%; right: 20%;
  height: 2px;
  border-radius: 0 0 4px 4px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: .7;
}

.card-header {
  margin-bottom: 28px;
}
.card-title {
  font-size: 20px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -.3px;
  margin-bottom: 5px;
}
.card-subtitle {
  font-size: 13px;
  color: var(--text3);
  line-height: 1.5;
}

/* ── 表单 ────────────────────────────────────────────────────────── */
.form-group { margin-bottom: 16px; }

.form-label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  margin-bottom: 6px;
  letter-spacing: .01em;
}

.form-input {
  width: 100%;
  padding: 10px 13px;
  font-size: 14px;
  font-family: var(--font);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  outline: none;
  transition: border-color .18s, box-shadow .18s, background .18s;
}
.form-input::placeholder { color: var(--text3); font-size: 13px; }
.form-input:focus {
  background: var(--surface);
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(37,99,235,.1);
}

/* ── 记住密码 ────────────────────────────────────────────── */
.remember-row {
  margin-bottom: 14px;
  display: flex;
  align-items: center;
}
.remember-label {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  user-select: none;
}
.remember-check {
  width: 16px; height: 16px;
  accent-color: var(--accent);
  cursor: pointer;
}
.remember-text {
  font-size: 12.5px;
  color: var(--text2);
}

.btn-login {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  background: var(--sb-bg);
  border: 1px solid rgba(255,255,255,.06);
  border-radius: var(--radius-sm);
  color: #f0ede6;
  font-family: var(--font);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: opacity .15s, transform .1s;
  letter-spacing: .1px;
}
/* teal shimmer on hover */
.btn-login::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(37,99,235,.0) 0%, rgba(37,99,235,.15) 100%);
  opacity: 0;
  transition: opacity .2s;
}
.btn-login:hover::before { opacity: 1; }
.btn-login:hover { opacity: .92; }
.btn-login:active { transform: scale(.98); }
.btn-login:disabled { opacity: .55; cursor: not-allowed; transform: none; }

.btn-inner {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  position: relative;
  z-index: 1;
}
.btn-arrow {
  width: 18px; height: 18px;
  border: 1px solid rgba(255,255,255,.2);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  transition: transform .2s;
}
.btn-login:hover .btn-arrow { transform: translateX(2px); }

@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,.2);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .65s linear infinite;
  flex-shrink: 0;
}

/* ── 消息框 ──────────────────────────────────────────────────────── */
.msg-box {
  display: none;
  align-items: flex-start;
  gap: 8px;
  padding: 10px 13px;
  border-radius: var(--radius-sm);
  font-size: 12.5px;
  margin-top: 12px;
  line-height: 1.5;
  animation: msgIn .2s ease;
}
@keyframes msgIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
.msg-box.show { display: flex; }
.msg-error   { background: var(--red-bg); border: 1px solid var(--red-border); color: var(--red); }
.msg-success { background: #edf7f2; border: 1px solid #a8d8bc; color: var(--green); }

/* ── 卡片底部 ────────────────────────────────────────────────────── */
.card-footer {
  margin-top: 24px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.footer-hint {
  font-size: 11.5px;
  color: var(--text3);
}
.footer-ver {
  font-family: var(--mono);
  font-size: 9.5px;
  color: var(--text3);
  padding: 2px 8px;
  border: 1px solid var(--border);
  border-radius: 4px;
  letter-spacing: .04em;
  display: flex;
  align-items: center;
  gap: 5px;
}
.footer-ver::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 4px var(--accent);
}

/* ── 输入框行内图标 ──────────────────────────────────────────────── */
.input-wrap { position: relative; }
.input-wrap .form-input { padding-left: 38px; }
.input-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 14px;
  pointer-events: none;
  transition: color .15s;
}
.input-wrap:focus-within .input-icon { color: var(--accent); }

/* ── 响应式（窄屏变单列）────────────────────────────────────────── */
@media (max-width: 640px) {
  .bg-left, .brand-panel { display: none; }
  .bg-right { width: 100%; }
  .form-panel { width: 100%; padding: 24px; }
}
</style>
</head>

// ── MD5 哈希（纯 JS 实现，用于密码加密存储）────
function md5(str) {
  function R(t,n){return(t<<n)|(t>>>(32-n))}
  function F(b,c,d){return(b&c)|((~b)&d)}
  function G(b,c,d){return(b&d)|(c&(~d))}
  function H(b,c,d){return b^c^d}
  function I(b,c,d){return c^(b|(~d))}
  function FF(a,b,c,d,x,s,t){ return R(a+F(b,c,d)+x+t,s)+b }
  function GG(a,b,c,d,x,s,t){ return R(a+G(b,c,d)+x+t,s)+b }
  function HH(a,b,c,d,x,s,t){ return R(a+H(b,c,d)+x+t,s)+b }
  function II(a,b,c,d,x,s,t){ return R(a+I(b,c,d)+x+t,s)+b }
  var bytes = [];
  for (var i = 0; i < str.length; i++) {
    var ch = str.charCodeAt(i);
    if (ch < 0x80) bytes.push(ch);
    else if (ch < 0x800) { bytes.push(0xc0|(ch>>6)); bytes.push(0x80|(ch&0x3f)); }
    else if (ch < 0x10000) { bytes.push(0xe0|(ch>>12)); bytes.push(0x80|((ch>>6)&0x3f)); bytes.push(0x80|(ch&0x3f)); }
    else { bytes.push(0xf0|(ch>>18)); bytes.push(0x80|((ch>>12)&0x3f)); bytes.push(0x80|((ch>>6)&0x3f)); bytes.push(0x80|(ch&0x3f)); }
  }
  var len = bytes.length;
  bytes.push(0x80);
  while ((bytes.length % 64) !== 56) bytes.push(0);
  var bits = len * 8;
  for (var i = 0; i < 8; i++) { bytes.push((bits >>> (i*8)) & 0xff); }
  var words = [];
  for (var i = 0; i < bytes.length; i += 4) {
    words.push(bytes[i] | (bytes[i+1]<<8) | (bytes[i+2]<<16) | (bytes[i+3]<<24));
  }
  var S = [7,12,17,22, 7,12,17,22, 7,12,17,22, 7,12,17,22,
           5,9,14,20, 5,9,14,20, 5,9,14,20, 5,9,14,20,
           4,11,16,23, 4,11,16,23, 4,11,16,23, 4,11,16,23,
           6,10,15,21, 6,10,15,21, 6,10,15,21, 6,10,15,21];
  var T = []; for (var i = 1; i <= 64; i++) T[i-1] = Math.floor(Math.abs(Math.sin(i)) * 0x100000000);
  var A=0x67452301, B=0xefcdab89, C=0x98badcfe, D=0x10325476;
  for (var k = 0; k < words.length; k += 16) {
    var a=A, b=B, c=C, d=D;
    for (var i = 0; i < 64; i++) {
      var f, g;
      if (i < 16) { f = F(b,c,d); g = i; }
      else if (i < 32) { f = G(b,c,d); g = (5*i+1)%16; }
      else if (i < 48) { f = H(b,c,d); g = (3*i+5)%16; }
      else { f = I(b,c,d); g = (7*i)%16; }
      var temp = d;
      d = c; c = b;
      b = R(a + f + T[i] + words[k+g], S[i]) + b;
      a = temp;
    }
    A = (A + a) | 0; B = (B + b) | 0; C = (C + c) | 0; D = (D + d) | 0;
  }
  function hex(v) { return ((v>>>0).toString(16)).padStart(8, '0'); }
  return hex(A) + hex(B) + hex(C) + hex(D);
}

  // 检查 Remember Me（5 天有效）
  const _r = JSON.parse(localStorage.getItem('pm_remember') || 'null');
  if (_r && _r.expires && Date.now() < _r.expires) {
    // 如果是退出登录后回到登录页，预填表单而不自动跳转
    if (_r.loggedOut) {
      document.getElementById('login-user').value = _r.name || '';
      document.getElementById('login-pass').value = _r.password || '';
      document.getElementById('remember-me').checked = true;
      // 清除 loggedOut 标记，下次可直接自动登录
      delete _r.loggedOut;
      localStorage.setItem('pm_remember', JSON.stringify(_r));
    } else {
      window.location.href = 'projectManage.html';
    }
  }
} catch(e) { localStorage.removeItem('pm_session'); localStorage.removeItem('pm_remember'); }

// 页面加载时检查锁定状态（防止刷新绕过）
(function checkLockOnLoad() {
  const count = parseInt(localStorage.getItem('pm_login_fail_count') || '0', 10);
  const lastFail = parseInt(localStorage.getItem('pm_login_fail_time') || '0', 10);
  if (count >= 5 && Date.now() - lastFail < 15 * 60 * 1000) {
    const secs = Math.ceil((15 * 60 * 1000 - (Date.now() - lastFail)) / 1000);
    const errBox = document.getElementById('msg-err');
    const btn = document.getElementById('login-btn');
    if (errBox) {
      errBox.textContent = '账号已临时锁定，请 ' + Math.ceil(secs / 60) + ' 分钟后再试';
      errBox.classList.add('show');
    }
    if (btn) btn.disabled = true;
  }
})();

// ── 登录频率限制 ──────────────────────────────────
const RATE_KEY_COUNT = 'pm_login_fail_count';
const RATE_KEY_TIME  = 'pm_login_fail_time';
const MAX_ATTEMPTS   = 5;
const LOCKOUT_MS     = 15 * 60 * 1000;

function getRateState() {
  const count = parseInt(localStorage.getItem(RATE_KEY_COUNT) || '0', 10);
  const lastFailTime = parseInt(localStorage.getItem(RATE_KEY_TIME) || '0', 10);
  return { count, lastFailTime };
}

function isRateLimited() {
  const { count, lastFailTime } = getRateState();
  if (count < MAX_ATTEMPTS) return false;
  if (Date.now() - lastFailTime < LOCKOUT_MS) return true;
  localStorage.removeItem(RATE_KEY_COUNT);
  localStorage.removeItem(RATE_KEY_TIME);
  return false;
}

function recordFailedAttempt() {
  const { count } = getRateState();
  localStorage.setItem(RATE_KEY_COUNT, count + 1);
  localStorage.setItem(RATE_KEY_TIME, Date.now());
}

function clearRateLimit() {
  localStorage.removeItem(RATE_KEY_COUNT);
  localStorage.removeItem(RATE_KEY_TIME);
}

function getRemainingLockSeconds() {
  const { lastFailTime } = getRateState();
  return Math.ceil((LOCKOUT_MS - (Date.now() - lastFailTime)) / 1000);
}

async function doLogin() {
  const name     = document.getElementById('login-user').value.trim();
  const pass     = document.getElementById('login-pass').value;
  const remember = document.getElementById('remember-me').checked;
  const btn      = document.getElementById('login-btn');
  const btnInner = document.getElementById('btn-inner');
  const errBox   = document.getElementById('msg-err');
  const okBox    = document.getElementById('msg-ok');

  errBox.classList.remove('show');
  okBox.classList.remove('show');

  if (!name || !pass) {
    errBox.textContent = '账号名和密码不能为空';
    errBox.classList.add('show');
    return;
  }

  // 检查是否处于锁定状态
  if (isRateLimited()) {
    const secs = getRemainingLockSeconds();
    const mins = Math.ceil(secs / 60);
    errBox.textContent = '登录尝试次数过多，请 ' + mins + ' 分钟后再试（剩余 ' + secs + ' 秒）';
    errBox.classList.add('show');
    return;
  }

  btn.disabled = true;
  btnInner.innerHTML = '<span class="spinner"></span><span>验证中...</span>';

  // 按用户名查用户（密码可能是 MD5 哈希或旧明文）
  const { data, error } = await sb
    .from('members').select('*')
    .eq('name', name).maybeSingle();

  if (error || !data) {
    recordFailedAttempt();

    btn.disabled = false;
    btnInner.innerHTML = '<span>进入系统</span><div class="btn-arrow">→</div>';

    const { count } = getRateState();
    const remaining = MAX_ATTEMPTS - count;

    if (remaining <= 0) {
      errBox.textContent = '账号或密码错误。连续失败 ' + MAX_ATTEMPTS + ' 次，账号已锁定 15 分钟。';
    } else if (remaining <= 2) {
      errBox.textContent = '账号或密码错误，还可尝试 ' + remaining + ' 次（失败过多将暂时锁定）';
    } else {
      errBox.textContent = error ? '数据库错误：' + error.message : '账号或密码错误，请重试';
    }

    errBox.classList.add('show');
    document.getElementById('login-pass').value = '';
    document.getElementById('login-pass').focus();
    return;
  }

  var hashedInput = md5(pass);
  var passwordMatch = false;

  if (data.password === hashedInput) {
    // 密码已是 MD5 哈希
    passwordMatch = true;
  } else if (data.password === pass) {
    // 密码仍为明文（旧数据），自动升级
    passwordMatch = true;
    try { await sb.from('members').update({ password: hashedInput }).eq('id', data.id); } catch(e) {}
  }

  if (!passwordMatch) {
    recordFailedAttempt();

    btn.disabled = false;
    btnInner.innerHTML = '<span>进入系统</span><div class="btn-arrow">→</div>';

    const { count: cnt2 } = getRateState();
    const remaining2 = MAX_ATTEMPTS - cnt2;

    if (remaining2 <= 0) {
      errBox.textContent = '账号或密码错误。连续失败 ' + MAX_ATTEMPTS + ' 次，账号已锁定 15 分钟。';
    } else if (remaining2 <= 2) {
      errBox.textContent = '账号或密码错误，还可尝试 ' + remaining2 + ' 次（失败过多将暂时锁定）';
    } else {
      errBox.textContent = '账号或密码错误，请重试';
    }

    errBox.classList.add('show');
    document.getElementById('login-pass').value = '';
    document.getElementById('login-pass').focus();
    return;
  }

  clearRateLimit();  // 登录成功，清除失败计数

  // Remember Me：5 天免输入，存储用户名和密码
  if (remember) {
    localStorage.setItem('pm_remember', JSON.stringify({
      name: name,
      password: pass,
      expires: Date.now() + 5 * 24 * 3600 * 1000
    }));
  } else {
    localStorage.removeItem('pm_remember');
  }

  // 安全：显式排除 password 字段，密码不进入前端 Session
  const { password: _pw, ...safeData } = data;
  localStorage.setItem('pm_session', JSON.stringify({
    ...safeData,
    loginAt: Date.now(),
    menuPerms: data.menu_perms || null,
    colorIdx: data.color_idx || 0
  }));

  try { await sb.from('logs').insert({
    id: 'i'+Date.now()+Math.random().toString(36).slice(2,6),
    user_id: data.id, user_name: data.name,
    action: '用户登录', detail: '',
    created_at: new Date().toISOString()
  }); } catch(e) {}

  btnInner.innerHTML = '<span>✓ 验证成功，跳转中...</span>';
  btn.style.background = '#1e6e44';
  setTimeout(() => { window.location.href = 'projectManage.html'; }, 600);
}
</script>
