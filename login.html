<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM 协作看板 · 登录</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
	<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #f0ede6;
  --surface:   #ffffff;
  --surface2:  #f5f3ee;
  --surface3:  #ebe9e3;
  --border:    #e4e1d8;
  --border2:   #ccc9bf;
  --text:      #1a1916;
  --text2:     #5c5a54;
  --text3:     #9c9a94;
  --teal:      #0e7268;
  --teal-bg:   #edf6f5;
  --teal-dim:  rgba(14,114,104,.1);
  --red:       #c94040;
  --red-bg:    #fdf2f2;
  --red-border:#f0c8c8;
  --green:     #1e6e44;
  --sb-bg:     #1c1b18;
  --sb-border: rgba(255,255,255,.07);
  --sb-text:   #c8c5be;
  --sb-text2:  #7a7870;
  --font:      'DM Sans', -apple-system, 'PingFang SC', sans-serif;
  --mono:      'DM Mono', monospace;
  --radius-sm: 6px;
  --radius:    10px;
  --radius-lg: 14px;
  --shadow:    0 1px 3px rgba(0,0,0,.04), 0 4px 14px rgba(0,0,0,.05);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.1), 0 2px 8px rgba(0,0,0,.06);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
  position: relative;
}

/* ── 背景纹理（与主页 sidebar 同款暗色块 + 暖色纸张底）──────────────── */
.bg-left {
  position: fixed;
  left: 0; top: 0; bottom: 0;
  width: 42%;
  background: var(--sb-bg);
  z-index: 0;
  /* 微妙的噪点质感 */
  background-image:
    radial-gradient(ellipse 80% 60% at 20% 50%, rgba(14,114,104,.12) 0%, transparent 70%),
    radial-gradient(ellipse 60% 80% at 80% 80%, rgba(14,114,104,.06) 0%, transparent 60%);
}
.bg-right {
  position: fixed;
  right: 0; top: 0; bottom: 0;
  width: 58%;
  background: var(--bg);
  z-index: 0;
}
/* 分隔线光晕 */
.bg-left::after {
  content: '';
  position: absolute;
  right: -1px; top: 10%; bottom: 10%;
  width: 1px;
  background: linear-gradient(to bottom,
    transparent,
    rgba(14,114,104,.4) 30%,
    rgba(14,114,104,.6) 50%,
    rgba(14,114,104,.4) 70%,
    transparent
  );
}

/* 浮动装饰点 */
.dot {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
}
.dot-1 {
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(14,114,104,.15) 0%, transparent 70%);
  top: -80px; left: -80px;
  animation: floatA 14s ease-in-out infinite;
}
.dot-2 {
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(14,114,104,.08) 0%, transparent 70%);
  bottom: 0; left: 20%;
  animation: floatB 18s ease-in-out infinite;
}
.dot-3 {
  width: 240px; height: 240px;
  background: radial-gradient(circle, rgba(240,237,230,.6) 0%, transparent 70%);
  top: -60px; right: 10%;
  animation: floatA 16s ease-in-out infinite reverse;
}
@keyframes floatA {
  0%, 100% { transform: translate(0, 0); }
  33%       { transform: translate(20px, 30px); }
  66%       { transform: translate(-10px, 15px); }
}
@keyframes floatB {
  0%, 100% { transform: translate(0, 0); }
  50%       { transform: translate(30px, -20px); }
}

/* ── 左侧品牌区 ─────────────────────────────────────────────────── */
.brand-panel {
  position: fixed;
  left: 0; top: 0; bottom: 0;
  width: 42%;
  z-index: 5;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px;
  gap: 0;
}

.brand-logo {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 56px; height: 56px;
  margin-bottom: 24px;
  position: relative;
}
.brand-logo svg {
  width: 56px; height: 56px;
  position: relative;
  z-index: 1;
}
.brand-logo-ring {
  position: absolute;
  inset: -8px;
  border-radius: 50%;
  border: 1px solid rgba(14,114,104,.25);
  animation: logoPulse 3s ease-in-out infinite;
}
.brand-logo-ring-2 {
  inset: -16px;
  border-color: rgba(14,114,104,.1);
  animation-delay: .6s;
}
@keyframes logoPulse {
  0%, 100% { opacity: .5; transform: scale(1); }
  50%       { opacity: 1; transform: scale(1.04); }
}

.brand-name {
  font-size: 22px;
  font-weight: 600;
  color: #f0ede6;
  letter-spacing: -.3px;
  margin-bottom: 8px;
  text-align: center;
}
.brand-sub {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--sb-text2);
  letter-spacing: .12em;
  text-align: center;
  margin-bottom: 40px;
}

/* 系统状态指示 */
.status-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 100%;
  max-width: 200px;
}
.status-item {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--sb-text2);
  letter-spacing: .04em;
}
.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--teal);
  box-shadow: 0 0 6px var(--teal);
  flex-shrink: 0;
  animation: dotBlink 2.5s ease-in-out infinite;
}
.status-dot.amber {
  background: #a06020;
  box-shadow: 0 0 6px #a06020;
  animation-delay: .5s;
}
.status-dot.blue {
  background: #1a52a0;
  box-shadow: 0 0 6px #1a52a0;
  animation-delay: 1s;
}
@keyframes dotBlink {
  0%, 100% { opacity: .5; }
  50%       { opacity: 1; }
}
.status-bar-fill {
  flex: 1;
  height: 1px;
  background: linear-gradient(to right, rgba(255,255,255,.08), transparent);
}

.brand-version {
  position: absolute;
  bottom: 28px;
  font-family: var(--mono);
  font-size: 9px;
  color: var(--sb-text2);
  letter-spacing: .08em;
  opacity: .6;
}

/* ── 右侧登录表单 ────────────────────────────────────────────────── */
.form-panel {
  position: fixed;
  right: 0; top: 0; bottom: 0;
  width: 58%;
  z-index: 5;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 48px;
}

.card {
  width: 100%;
  max-width: 380px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 38px 36px;
  box-shadow: var(--shadow-lg);
  animation: cardIn .4s cubic-bezier(.22,1,.36,1) both;
  position: relative;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(20px) scale(.98); }
  to   { opacity: 1; transform: none; }
}

/* 卡片顶部 teal 线 */
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 20%; right: 20%;
  height: 2px;
  border-radius: 0 0 4px 4px;
  background: linear-gradient(90deg, transparent, var(--teal), transparent);
  opacity: .7;
}

.card-header {
  margin-bottom: 28px;
}
.card-title {
  font-size: 20px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -.3px;
  margin-bottom: 5px;
}
.card-subtitle {
  font-size: 13px;
  color: var(--text3);
  line-height: 1.5;
}

/* ── 表单 ────────────────────────────────────────────────────────── */
.form-group { margin-bottom: 16px; }

.form-label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  margin-bottom: 6px;
  letter-spacing: .01em;
}

.form-input {
  width: 100%;
  padding: 10px 13px;
  font-size: 14px;
  font-family: var(--font);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  outline: none;
  transition: border-color .18s, box-shadow .18s, background .18s;
}
.form-input::placeholder { color: var(--text3); font-size: 13px; }
.form-input:focus {
  background: var(--surface);
  border-color: var(--teal);
  box-shadow: 0 0 0 3px rgba(14,114,104,.1);
}

.btn-login {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  background: var(--sb-bg);
  border: 1px solid rgba(255,255,255,.06);
  border-radius: var(--radius-sm);
  color: #f0ede6;
  font-family: var(--font);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: opacity .15s, transform .1s;
  letter-spacing: .1px;
}
/* teal shimmer on hover */
.btn-login::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(14,114,104,.0) 0%, rgba(14,114,104,.15) 100%);
  opacity: 0;
  transition: opacity .2s;
}
.btn-login:hover::before { opacity: 1; }
.btn-login:hover { opacity: .92; }
.btn-login:active { transform: scale(.98); }
.btn-login:disabled { opacity: .55; cursor: not-allowed; transform: none; }

.btn-inner {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  position: relative;
  z-index: 1;
}
.btn-arrow {
  width: 18px; height: 18px;
  border: 1px solid rgba(255,255,255,.2);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  transition: transform .2s;
}
.btn-login:hover .btn-arrow { transform: translateX(2px); }

@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,.2);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .65s linear infinite;
  flex-shrink: 0;
}

/* ── 消息框 ──────────────────────────────────────────────────────── */
.msg-box {
  display: none;
  align-items: flex-start;
  gap: 8px;
  padding: 10px 13px;
  border-radius: var(--radius-sm);
  font-size: 12.5px;
  margin-top: 12px;
  line-height: 1.5;
  animation: msgIn .2s ease;
}
@keyframes msgIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
.msg-box.show { display: flex; }
.msg-error   { background: var(--red-bg); border: 1px solid var(--red-border); color: var(--red); }
.msg-success { background: #edf7f2; border: 1px solid #a8d8bc; color: var(--green); }

/* ── 卡片底部 ────────────────────────────────────────────────────── */
.card-footer {
  margin-top: 24px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.footer-hint {
  font-size: 11.5px;
  color: var(--text3);
}
.footer-ver {
  font-family: var(--mono);
  font-size: 9.5px;
  color: var(--text3);
  padding: 2px 8px;
  border: 1px solid var(--border);
  border-radius: 4px;
  letter-spacing: .04em;
  display: flex;
  align-items: center;
  gap: 5px;
}
.footer-ver::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--teal);
  box-shadow: 0 0 4px var(--teal);
}

/* ── 输入框行内图标 ──────────────────────────────────────────────── */
.input-wrap { position: relative; }
.input-wrap .form-input { padding-left: 38px; }
.input-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 14px;
  pointer-events: none;
  transition: color .15s;
}
.input-wrap:focus-within .input-icon { color: var(--teal); }

/* ── 响应式（窄屏变单列）────────────────────────────────────────── */
@media (max-width: 640px) {
  .bg-left, .brand-panel { display: none; }
  .bg-right { width: 100%; }
  .form-panel { width: 100%; padding: 24px; }
}
</style>
</head>
<body>

<!-- 背景 -->
<div class="bg-left"></div>
<div class="bg-right"></div>
<div class="dot dot-1"></div>
<div class="dot dot-2"></div>
<div class="dot dot-3"></div>

<!-- 左侧品牌面板 -->
<div class="brand-panel">
  <div class="brand-logo">
    <div class="brand-logo-ring"></div>
    <div class="brand-logo-ring brand-logo-ring-2"></div>
    <svg viewBox="0 0 56 56" fill="none">
      <circle cx="28" cy="28" r="24" stroke="rgba(14,114,104,.2)" stroke-width="1.5"/>
      <rect x="14" y="15" width="12" height="12" rx="3" fill="rgba(14,114,104,.8)"/>
      <rect x="30" y="15" width="12" height="12" rx="3" fill="rgba(14,114,104,.4)"/>
      <rect x="14" y="31" width="12" height="10" rx="3" fill="rgba(14,114,104,.4)"/>
      <rect x="30" y="31" width="12" height="10" rx="3" fill="rgba(14,114,104,.9)"/>
    </svg>
  </div>

  <div class="brand-name">PM 协作看板</div>
  <div class="brand-sub">COLLABORATIVE TASK MANAGER</div>

  <div class="status-list">
    <div class="status-item">
      <div class="status-dot"></div>
      <span>DATABASE</span>
      <div class="status-bar-fill"></div>
      <span style="color:rgba(14,114,104,.8)">ONLINE</span>
    </div>
    <div class="status-item">
      <div class="status-dot amber"></div>
      <span>REALTIME</span>
      <div class="status-bar-fill"></div>
      <span style="color:rgba(160,96,32,.8)">ACTIVE</span>
    </div>
    <div class="status-item">
      <div class="status-dot blue"></div>
      <span>SECURE</span>
      <div class="status-bar-fill"></div>
      <span style="color:rgba(26,82,160,.8)">ENABLED</span>
    </div>
  </div>

  <div class="brand-version">ACCESS CONTROL v2.0 · PM BOARD v4</div>
</div>

<!-- 右侧登录表单 -->
<div class="form-panel">
  <div class="card">
    <div class="card-header">
      <div class="card-title">欢迎回来</div>
      <div class="card-subtitle">输入你的账号和密码以继续</div>
    </div>

    <div class="form-group">
      <label class="form-label">账号名</label>
      <div class="input-wrap">
        <i data-lucide="user" class="input-icon"></i>
        <input type="text" id="login-user" class="form-input"
               placeholder="输入你的账号名"
               autocomplete="username"
               onkeydown="if(event.key==='Enter')document.getElementById('login-pass').focus()">
      </div>
    </div>

    <div class="form-group" style="margin-bottom:22px">
      <label class="form-label">登录密码</label>
      <div class="input-wrap">
        <i data-lucide="key" class="input-icon"></i>
        <input type="password" id="login-pass" class="form-input"
               placeholder="••••••••"
               autocomplete="current-password"
               onkeydown="if(event.key==='Enter')doLogin()">
      </div>
    </div>

    <button class="btn-login" id="login-btn" onclick="doLogin()">
      <div class="btn-inner" id="btn-inner">
        <span>进入系统</span>
        <div class="btn-arrow">→</div>
      </div>
    </button>

    <div class="msg-box msg-error"   id="msg-err"></div>
    <div class="msg-box msg-success" id="msg-ok"></div>

    <div class="card-footer">
      <div class="footer-hint">仅限授权成员访问</div>
      <div class="footer-ver">v4.0</div>
    </div>
  </div>
</div>

<script>
;(function patchPostMessage() {
  const orig = window.postMessage.bind(window);
  window.postMessage = function(data, targetOrigin, transfer) {
    try { orig(data, targetOrigin, transfer); }
    catch(e) { if (e.name !== 'DataCloneError') throw e; }
  };
})();

const SUPABASE_URL = 'https://rfjrkcclhvuldenpdlye.supabase.co';
const SUPABASE_KEY = 'sb_publishable_a29IWCUpjugzMqx6VGnNhw_bpU9Grpi';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: {
    persistSession: false, autoRefreshToken: false,
    detectSessionInUrl: false,
    storage: { getItem: ()=>null, setItem: ()=>{}, removeItem: ()=>{} }
  }
});

try {
  const _s = JSON.parse(localStorage.getItem('pm_session') || 'null');
  if (_s && _s.id && _s.loginAt && (Date.now() - _s.loginAt) < 8*3600*1000)
    window.location.href = 'projectManage.html';
} catch(e) { localStorage.removeItem('pm_session'); }

async function doLogin() {
  const name     = document.getElementById('login-user').value.trim();
  const pass     = document.getElementById('login-pass').value;
  const btn      = document.getElementById('login-btn');
  const btnInner = document.getElementById('btn-inner');
  const errBox   = document.getElementById('msg-err');
  const okBox    = document.getElementById('msg-ok');

  errBox.classList.remove('show');
  okBox.classList.remove('show');

  if (!name || !pass) {
    errBox.textContent = '账号名和密码不能为空';
    errBox.classList.add('show');
    return;
  }

  btn.disabled = true;
  btnInner.innerHTML = '<span class="spinner"></span><span>验证中...</span>';

  const { data, error } = await sb
    .from('members').select('*')
    .eq('name', name).eq('password', pass).maybeSingle();

  if (error || !data) {
    btn.disabled = false;
    btnInner.innerHTML = '<span>进入系统</span><div class="btn-arrow">→</div>';
    errBox.textContent = error ? '数据库错误：' + error.message : '账号或密码错误，请重试';
    errBox.classList.add('show');
    document.getElementById('login-pass').value = '';
    document.getElementById('login-pass').focus();
    return;
  }

  localStorage.setItem('pm_session', JSON.stringify({ ...data, loginAt: Date.now() }));
	  try { await sb.from('logs').insert({
	    id: 'i'+Date.now()+Math.random().toString(36).slice(2,6),
	    user_id: data.id, user_name: data.name,
	    action: '用户登录', detail: '',
	    created_at: new Date().toISOString()
	  }); } catch(e) {}
  btnInner.innerHTML = '<span>✓ 验证成功，跳转中...</span>';
  btn.style.background = '#1e6e44';
  setTimeout(() => { window.location.href = 'projectManage.html'; }, 600);
}
</script>
<script>document.addEventListener("DOMContentLoaded",function(){if(typeof lucide!=="undefined")lucide.createIcons()})</script>
</body>
</html>
