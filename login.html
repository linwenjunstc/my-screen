<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM 协作看板 · 登录</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07090f; --surface: rgba(13,17,30,0.88); --border: rgba(255,255,255,0.07);
    --border-glow: rgba(0,210,255,0.4); --text: #e8eaf0; --text2: #8890a4; --text3: #4a5068;
    --accent: #00d2ff; --red: #ff4d6a; --green: #00e5a0;
    --mono: 'Space Mono', monospace; --font: 'DM Sans', -apple-system, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); overflow: hidden; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .grid-bg { position: fixed; inset: 0; z-index: 0; }
  .grid-bg::before { content:''; position:absolute; inset:-50%; background-image:linear-gradient(rgba(0,210,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,210,255,.04) 1px,transparent 1px); background-size:44px 44px; animation:gridMove 20s linear infinite; }
  .grid-bg::after { content:''; position:absolute; inset:0; background:radial-gradient(ellipse 70% 60% at 50% 40%,transparent 0%,var(--bg) 80%); }
  @keyframes gridMove { 0%{transform:translate(0,0)} 100%{transform:translate(44px,44px)} }
  .orb { position:fixed; border-radius:50%; filter:blur(80px); z-index:0; pointer-events:none; }
  .orb-1 { width:500px;height:500px;background:rgba(0,90,180,.18);top:-160px;left:-120px;animation:orbFloat1 12s ease-in-out infinite; }
  .orb-2 { width:400px;height:400px;background:rgba(0,180,120,.10);bottom:-100px;right:-80px;animation:orbFloat2 15s ease-in-out infinite; }
  @keyframes orbFloat1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(40px,30px)} }
  @keyframes orbFloat2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-30px,-40px)} }
  .scanline { position:fixed;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(0,210,255,.3),transparent);z-index:1;animation:scanMove 6s ease-in-out infinite;pointer-events:none; }
  @keyframes scanMove { 0%{top:-4px;opacity:0} 10%{opacity:1} 90%{opacity:.6} 100%{top:100vh;opacity:0} }
  .card-wrap { position:relative;z-index:10;width:100%;max-width:400px;padding:0 20px; }
  .card { background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px 38px 36px;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);position:relative;overflow:hidden;box-shadow:0 0 0 1px rgba(255,255,255,.04),0 24px 80px rgba(0,0,0,.5),0 0 20px rgba(0,210,255,.15);animation:cardIn .5s cubic-bezier(.22,1,.36,1) both; }
  @keyframes cardIn { from{opacity:0;transform:translateY(24px) scale(.97)} to{opacity:1;transform:none} }
  .card::before { content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.6; }
  .corner { position:absolute;width:12px;height:12px; }
  .corner-tl { top:10px;left:10px;border-top:1px solid rgba(0,210,255,.4);border-left:1px solid rgba(0,210,255,.4); }
  .corner-tr { top:10px;right:10px;border-top:1px solid rgba(0,210,255,.4);border-right:1px solid rgba(0,210,255,.4); }
  .corner-bl { bottom:10px;left:10px;border-bottom:1px solid rgba(0,210,255,.4);border-left:1px solid rgba(0,210,255,.4); }
  .corner-br { bottom:10px;right:10px;border-bottom:1px solid rgba(0,210,255,.4);border-right:1px solid rgba(0,210,255,.4); }
  .logo-area { text-align:center;margin-bottom:30px; }
  .logo-icon { width:48px;height:48px;margin:0 auto 14px;position:relative;display:flex;align-items:center;justify-content:center; }
  .logo-icon svg { width:48px;height:48px; }
  .logo-ring { position:absolute;inset:0;border-radius:50%;border:1px solid rgba(0,210,255,.3);animation:ringPulse 3s ease-in-out infinite; }
  .logo-ring-2 { inset:-6px;border-color:rgba(0,210,255,.12);animation-delay:.5s; }
  @keyframes ringPulse { 0%,100%{opacity:.5;transform:scale(1)} 50%{opacity:1;transform:scale(1.04)} }
  .logo-title { font-size:18px;font-weight:600;color:var(--text);letter-spacing:.5px;margin-bottom:4px; }
  .logo-sub { font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.12em;text-transform:uppercase; }
  .status-bar { display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:26px;padding:7px 14px;background:rgba(0,0,0,.25);border:1px solid var(--border);border-radius:6px; }
  .status-dot { display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:.05em; }
  .status-dot::before { content:'';width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:dotPulse 2s ease-in-out infinite; }
  .status-dot:nth-child(2)::before { animation-delay:.4s; }
  .status-dot:nth-child(3)::before { animation-delay:.8s;background:var(--accent);box-shadow:0 0 6px var(--accent); }
  @keyframes dotPulse { 0%,100%{opacity:.6} 50%{opacity:1} }
  .form-group { margin-bottom:16px; }
  .form-label { display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:9px;font-weight:700;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:7px; }
  .form-label::before { content:'//';color:var(--accent);opacity:.7; }
  .form-input { width:100%;padding:11px 14px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s,background .2s;caret-color:var(--accent); }
  .form-input::placeholder { color:var(--text3); }
  .form-input:focus { border-color:var(--border-glow);background:rgba(0,210,255,.04);box-shadow:0 0 0 3px rgba(0,210,255,.08); }
  .btn-login { width:100%;padding:13px;background:linear-gradient(135deg,#0090c8,#00d2ff,#00a8d8);border:none;border-radius:8px;color:#fff;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;letter-spacing:.3px;position:relative;overflow:hidden;transition:opacity .2s,transform .1s;margin-top:6px; }
  .btn-login:hover { opacity:.9; }
  .btn-login:active { transform:scale(.99); }
  .btn-login:disabled { opacity:.6;cursor:not-allowed;transform:none; }
  .btn-inner { display:flex;align-items:center;justify-content:center;gap:8px; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .spinner { width:15px;height:15px;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0; }
  .msg-box { display:none;align-items:flex-start;gap:8px;padding:10px 12px;border-radius:6px;font-size:12px;margin-top:12px;line-height:1.5; }
  .msg-box.show { display:flex; }
  .msg-error { background:rgba(255,77,106,.08);border:1px solid rgba(255,77,106,.2);color:var(--red); }
  .msg-success { background:rgba(0,229,160,.08);border:1px solid rgba(0,229,160,.2);color:var(--green); }
  .card-footer { margin-top:20px;display:flex;align-items:center;justify-content:space-between; }
  .footer-tag { font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:.06em; }
  .version-badge { display:flex;align-items:center;gap:5px;padding:3px 8px;border:1px solid var(--border);border-radius:4px;font-family:var(--mono);font-size:9px;color:var(--text3); }
  .version-badge::before { content:'●';color:var(--accent);font-size:7px; }
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="scanline"></div>

<div class="card-wrap">
  <div class="card">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
    <div class="logo-area">
      <div class="logo-icon">
        <div class="logo-ring"></div>
        <div class="logo-ring logo-ring-2"></div>
        <svg viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="20" stroke="rgba(0,210,255,.2)" stroke-width="1.5"/>
          <rect x="13" y="14" width="10" height="10" rx="2" fill="rgba(0,210,255,.7)" opacity=".8"/>
          <rect x="25" y="14" width="10" height="10" rx="2" fill="rgba(0,210,255,.4)" opacity=".6"/>
          <rect x="13" y="26" width="10" height="8" rx="2" fill="rgba(0,210,255,.4)" opacity=".5"/>
          <rect x="25" y="26" width="10" height="8" rx="2" fill="rgba(0,210,255,.7)" opacity=".9"/>
        </svg>
      </div>
      <div class="logo-title">PM 协作看板</div>
      <div class="logo-sub">Collaborative Task Manager</div>
    </div>
    <div class="status-bar">
      <div class="status-dot">DATABASE</div>
      <div class="status-dot">REALTIME</div>
      <div class="status-dot">SECURE</div>
    </div>
    <div class="form-group">
      <div class="form-label">账号名</div>
      <input type="text" id="login-user" class="form-input" placeholder="输入你的账号名"
             autocomplete="username" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="form-group" style="margin-bottom:20px">
      <div class="form-label">登录密码</div>
      <input type="password" id="login-pass" class="form-input" placeholder="••••••••"
             autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-login" id="login-btn" onclick="doLogin()">
      <div class="btn-inner" id="btn-inner">
        <span>进入系统</span>
        <span style="font-size:16px;line-height:1">→</span>
      </div>
    </button>
    <div class="msg-box msg-error" id="msg-err"></div>
    <div class="msg-box msg-success" id="msg-ok"></div>
    <div class="card-footer">
      <div class="footer-tag">ACCESS CONTROL v2.0</div>
      <div class="version-badge">PM BOARD v4</div>
    </div>
  </div>
</div>

<script>
// ── 补丁：静默吞掉 Supabase 客户端的 DataCloneError ──────────────────────────
// Supabase JS 新版本会在 auth 广播时调用 window.postMessage 传递 Headers 对象，
// Headers 无法被序列化，导致 DataCloneError。我们不需要这个广播功能，直接屏蔽。
;(function patchPostMessage() {
  const orig = window.postMessage.bind(window);
  window.postMessage = function(data, targetOrigin, transfer) {
    try { orig(data, targetOrigin, transfer); }
    catch(e) { if (e.name !== 'DataCloneError') throw e; }
  };
})();

// ── Supabase 初始化 ───────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://rfjrkcclhvuldenpdlye.supabase.co';
const SUPABASE_KEY = 'sb_publishable_a29IWCUpjugzMqx6VGnNhw_bpU9Grpi';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: {
    persistSession: false,
    autoRefreshToken: false,
    detectSessionInUrl: false,
    storage: { getItem: ()=>null, setItem: ()=>{}, removeItem: ()=>{} }
  }
});

// ── 已有有效 Session 则直接跳转 ───────────────────────────────────────────────
try {
  const _s = JSON.parse(localStorage.getItem('pm_session') || 'null');
  if (_s && _s.id && _s.loginAt && (Date.now() - _s.loginAt) < 8*3600*1000) {
    window.location.href = 'projectManage.html';
  }
} catch(e) { localStorage.removeItem('pm_session'); }

// ── 登录 ──────────────────────────────────────────────────────────────────────
async function doLogin() {
  const name     = document.getElementById('login-user').value.trim();
  const pass     = document.getElementById('login-pass').value;
  const btn      = document.getElementById('login-btn');
  const btnInner = document.getElementById('btn-inner');
  const errBox   = document.getElementById('msg-err');

  errBox.classList.remove('show');
  if (!name || !pass) {
    errBox.textContent = '账号名和密码不能为空';
    errBox.classList.add('show');
    return;
  }

  btn.disabled = true;
  btnInner.innerHTML = '<span class="spinner"></span><span>验证中...</span>';

  const { data, error } = await sb
    .from('members')
    .select('*')
    .eq('name', name)
    .eq('password', pass)
    .maybeSingle();

  if (error) {
    btn.disabled = false;
    btnInner.innerHTML = '<span>进入系统</span><span style="font-size:16px;line-height:1">→</span>';
    errBox.textContent = '数据库错误：' + error.message;
    errBox.classList.add('show');
    return;
  }

  if (!data) {
    btn.disabled = false;
    btnInner.innerHTML = '<span>进入系统</span><span style="font-size:16px;line-height:1">→</span>';
    errBox.textContent = '账号或密码错误';
    errBox.classList.add('show');
    return;
  }

  // 登录成功
  localStorage.setItem('pm_session', JSON.stringify({ ...data, loginAt: Date.now() }));
  btnInner.innerHTML = '<span>✓</span><span>验证成功，跳转中...</span>';
  setTimeout(() => { window.location.href = 'projectManage.html'; }, 500);
}
</script>
</body>
</html>
